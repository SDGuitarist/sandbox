<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Habit Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('habits.dashboard') }}" class="nav-brand">Habit Tracker</a>
        <div class="nav-links">
            <a href="{{ url_for('habits.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('habits.calendar') }}">Calendar</a>
            <a href="{{ url_for('habits.new_habit') }}">+ New Habit</a>
        </div>
    </nav>
    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
