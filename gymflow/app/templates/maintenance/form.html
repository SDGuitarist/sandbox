{% extends "base.html" %}

{% block title %}{{ 'Edit' if record else 'New' }} Maintenance Record{% endblock %}

{% block content %}
<h1>{{ 'Edit' if record else 'New' }} Maintenance Record</h1>

<form method="POST" action="{{ url_for('maintenance.update_maintenance', maintenance_id=record.id) if record else url_for('maintenance.create_maintenance') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="equipment_id" class="form-label">Equipment <span class="text-danger">*</span></label>
        <select name="equipment_id" id="equipment_id" class="form-select" required>
            <option value="">-- Select Equipment --</option>
            {% for eq in equipment_list %}
            <option value="{{ eq.id }}" {% if record and record.equipment_id == eq.id %}selected{% endif %}>{{ eq.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
        <textarea name="description" id="description" class="form-control" rows="3" required maxlength="500">{{ record.description if record else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label for="maintenance_date" class="form-label">Maintenance Date <span class="text-danger">*</span></label>
        <input type="date" name="maintenance_date" id="maintenance_date" class="form-control" value="{{ record.maintenance_date if record else '' }}" required>
    </div>

    <div class="mb-3">
        <label for="cost" class="form-label">Cost ($)</label>
        <input type="number" name="cost" id="cost" class="form-control" step="0.01" min="0" value="{{ '%.2f'|format(record.cost_cents / 100) if record else '0.00' }}">
    </div>

    <div class="mb-3">
        <label for="performed_by" class="form-label">Performed By</label>
        <input type="text" name="performed_by" id="performed_by" class="form-control" value="{{ record.performed_by if record else '' }}">
    </div>

    <div class="mb-3">
        <label for="next_due_date" class="form-label">Next Due Date</label>
        <input type="date" name="next_due_date" id="next_due_date" class="form-control" value="{{ record.next_due_date if record else '' }}">
    </div>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary">{{ 'Update' if record else 'Create' }}</button>
        <a href="{{ url_for('maintenance.list_maintenance') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
