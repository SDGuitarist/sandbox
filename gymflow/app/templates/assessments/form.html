{% extends "base.html" %}

{% block title %}{{ 'Edit Assessment' if assessment else 'New Assessment' }} - GymFlow{% endblock %}

{% block content %}
<h1 class="mb-4">{{ 'Edit Assessment' if assessment else 'New Assessment' }}</h1>

<form method="POST" action="{{ url_for('assessments.update_assessment', assessment_id=assessment['id']) if assessment else url_for('assessments.create_assessment') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="member_id" class="form-label">Member <span class="text-danger">*</span></label>
        <select name="member_id" id="member_id" class="form-select" required>
            <option value="">-- Select Member --</option>
            {% for m in members %}
            <option value="{{ m['id'] }}" {% if assessment and assessment['member_id'] == m['id'] %}selected{% endif %}>{{ m['name'] }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="trainer_id" class="form-label">Trainer</label>
        <select name="trainer_id" id="trainer_id" class="form-select">
            <option value="">-- None --</option>
            {% for t in trainers %}
            <option value="{{ t['id'] }}" {% if assessment and assessment['trainer_id'] == t['id'] %}selected{% endif %}>{{ t['name'] }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="assessment_date" class="form-label">Date <span class="text-danger">*</span></label>
        <input type="date" name="assessment_date" id="assessment_date" class="form-control"
               value="{{ assessment['assessment_date'] if assessment else '' }}" required>
    </div>

    <div class="row">
        <div class="col-md-3 mb-3">
            <label for="weight_kg" class="form-label">Weight (kg)</label>
            <input type="number" step="0.1" min="0" name="weight_kg" id="weight_kg" class="form-control"
                   value="{{ assessment['weight_kg'] if assessment and assessment['weight_kg'] is not none else '' }}">
        </div>

        <div class="col-md-3 mb-3">
            <label for="height_cm" class="form-label">Height (cm)</label>
            <input type="number" step="0.1" min="0" name="height_cm" id="height_cm" class="form-control"
                   value="{{ assessment['height_cm'] if assessment and assessment['height_cm'] is not none else '' }}">
        </div>

        <div class="col-md-3 mb-3">
            <label for="body_fat_pct" class="form-label">Body Fat %</label>
            <input type="number" step="0.1" min="0" max="100" name="body_fat_pct" id="body_fat_pct" class="form-control"
                   value="{{ assessment['body_fat_pct'] if assessment and assessment['body_fat_pct'] is not none else '' }}">
        </div>

        <div class="col-md-3 mb-3">
            <label for="resting_heart_rate" class="form-label">Resting Heart Rate</label>
            <input type="number" min="0" name="resting_heart_rate" id="resting_heart_rate" class="form-control"
                   value="{{ assessment['resting_heart_rate'] if assessment and assessment['resting_heart_rate'] is not none else '' }}">
        </div>
    </div>

    <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea name="notes" id="notes" class="form-control" rows="3">{{ assessment['notes'] if assessment else '' }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ 'Update' if assessment else 'Create' }} Assessment</button>
        <a href="{{ url_for('assessments.list_assessments') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
