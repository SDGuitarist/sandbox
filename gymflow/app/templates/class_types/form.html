{% extends "base.html" %}

{% block title %}{{ 'Edit Class Type' if ctype else 'New Class Type' }}{% endblock %}

{% block content %}
<h1>{{ 'Edit Class Type' if ctype else 'New Class Type' }}</h1>

<form method="POST" action="{{ url_for('class_types.update_type', type_id=ctype['id']) if ctype else url_for('class_types.create_type') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" maxlength="100" required value="{{ ctype['name'] if ctype else '' }}">
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ ctype['description'] if ctype else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label for="duration_minutes" class="form-label">Duration (minutes)</label>
        <input type="number" class="form-control" id="duration_minutes" name="duration_minutes" min="1" required value="{{ ctype['duration_minutes'] if ctype else '60' }}">
    </div>

    <div class="mb-3">
        <label for="default_capacity" class="form-label">Default Capacity</label>
        <input type="number" class="form-control" id="default_capacity" name="default_capacity" min="1" required value="{{ ctype['default_capacity'] if ctype else '20' }}">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ 'Update' if ctype else 'Create' }}</button>
        <a href="{{ url_for('class_types.list_types') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
