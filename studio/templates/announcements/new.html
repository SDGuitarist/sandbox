{% extends "base.html" %}

{% block title %}New Announcement{% endblock %}

{% block content %}
<h1 class="h3 mb-3">New announcement</h1>

<form method="post" action="{{ url_for('announcements.create_announcement') }}" class="col-md-8">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

  <div class="mb-3">
    <label class="form-label" for="title">Title</label>
    <input type="text" class="form-control" id="title" name="title"
           value="{{ title }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label" for="body">Body</label>
    <textarea class="form-control" id="body" name="body" rows="5" required>{{ body }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label" for="audience">Audience</label>
    <select class="form-select" id="audience" name="audience">
      {% for a in audiences %}
      <option value="{{ a }}" {% if a == audience %}selected{% endif %}>{{ a }}</option>
      {% endfor %}
    </select>
  </div>

  <button type="submit" class="btn btn-primary">Post announcement</button>
  <a class="btn btn-secondary" href="{{ url_for('announcements.list_announcements') }}">Cancel</a>
</form>
{% endblock %}
