{% extends "base.html" %}
{% block title %}New Student{% endblock %}
{% block content %}
<h1 class="h3 mb-3">New Student</h1>

<form method="post" action="{{ url_for('students.create_student') }}" class="col-md-6">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

  <div class="mb-3">
    <label for="first_name" class="form-label">First Name</label>
    <input type="text" class="form-control" id="first_name" name="first_name"
           value="{{ student.first_name if student else '' }}" required>
  </div>

  <div class="mb-3">
    <label for="last_name" class="form-label">Last Name</label>
    <input type="text" class="form-control" id="last_name" name="last_name"
           value="{{ student.last_name if student else '' }}" required>
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email"
           value="{{ student.email if student else '' }}">
  </div>

  <div class="mb-3">
    <label for="phone" class="form-label">Phone</label>
    <input type="text" class="form-control" id="phone" name="phone"
           value="{{ student.phone if student else '' }}">
  </div>

  <div class="mb-3">
    <label for="skill_level" class="form-label">Skill Level</label>
    <select class="form-select" id="skill_level" name="skill_level">
      {% for level in skill_levels %}
      <option value="{{ level }}"
        {% if student and student.skill_level == level %}selected{% endif %}>
        {{ level|capitalize }}
      </option>
      {% endfor %}
    </select>
  </div>

  <button type="submit" class="btn btn-primary">Create Student</button>
  <a href="{{ url_for('students.list_students') }}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
