{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h1 class="h3 mb-4">Create an account</h1>
    <form method="post" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ request.form.get('name', '') }}" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email"
               value="{{ request.form.get('email', '') }}" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               minlength="8" required>
        <div class="form-text">At least 8 characters.</div>
      </div>
      <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select class="form-select" id="role" name="role">
          <option value="student"
            {% if request.form.get('role') == 'student' %}selected{% endif %}>Student</option>
          <option value="instructor"
            {% if request.form.get('role') == 'instructor' %}selected{% endif %}>Instructor</option>
          <option value="admin"
            {% if request.form.get('role') == 'admin' %}selected{% endif %}>Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Register</button>
      <a class="btn btn-link" href="{{ url_for('auth.login') }}">Already have an account?</a>
    </form>
  </div>
</div>
{% endblock %}
