{% extends "base.html" %}
{% block title %}New invoice{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">New invoice</h1>
  <a class="btn btn-outline-secondary" href="{{ url_for('invoices.list_invoices') }}">Back to invoices</a>
</div>

<p class="text-muted">
  Selecting a student opens their single draft invoice — if one already exists you'll land on it.
</p>

<form method="post" action="{{ url_for('invoices.create_invoice') }}" class="col-lg-6">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

  <div class="mb-3">
    <label for="student_id" class="form-label">Student</label>
    <select id="student_id" name="student_id" class="form-select" required>
      <option value="">Select a student…</option>
      {% for s in students %}
        <option value="{{ s.id }}">
          {{ s.first_name }} {{ s.last_name }}{% if s.email %} ({{ s.email }}){% endif %}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description <span class="text-muted">(optional)</span></label>
    <input type="text" id="description" name="description" class="form-control" maxlength="255">
  </div>

  <div class="mb-3">
    <label for="due_at" class="form-label">Due date <span class="text-muted">(optional)</span></label>
    <input type="date" id="due_at" name="due_at" class="form-control">
  </div>

  <button type="submit" class="btn btn-primary">Open draft invoice</button>
</form>
{% endblock %}
