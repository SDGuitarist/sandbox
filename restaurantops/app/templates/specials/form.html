{% extends "base.html" %}

{% block title %}{{ 'Edit Special' if special else 'New Special' }} - RestaurantOps{% endblock %}

{% block content %}
<h1>{{ 'Edit Special' if special else 'New Special' }}</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ special['name'] if special else '' }}" required>
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ special['description'] if special and special['description'] else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">Price ($)</label>
        <input type="text" class="form-control" id="price" name="price"
               value="{{ '%.2f'|format(special['price_cents'] / 100) if special else '' }}" required>
    </div>

    <div class="mb-3">
        <label for="menu_item_id" class="form-label">Linked Menu Item (optional)</label>
        <select class="form-select" id="menu_item_id" name="menu_item_id">
            <option value="">-- None --</option>
            {% for item in menu_items %}
            <option value="{{ item['id'] }}"
                    {% if special and special['menu_item_id'] == item['id'] %}selected{% endif %}>
                {{ item['name'] }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label for="start_date" class="form-label">Start Date</label>
            <input type="date" class="form-control" id="start_date" name="start_date"
                   value="{{ special['start_date'] if special else '' }}" required>
        </div>
        <div class="col-md-6">
            <label for="end_date" class="form-label">End Date</label>
            <input type="date" class="form-control" id="end_date" name="end_date"
                   value="{{ special['end_date'] if special else '' }}" required>
        </div>
    </div>

    {% if special %}
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="is_active" name="is_active"
               {% if special['is_active'] %}checked{% endif %}>
        <label class="form-check-label" for="is_active">Active</label>
    </div>
    {% endif %}

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('specials.list_specials') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
