{% extends "base.html" %}

{% block title %}{{ 'Edit' if member else 'Add' }} Staff Member - RestaurantOps{% endblock %}

{% block content %}
<h1>{{ 'Edit' if member else 'Add' }} Staff Member</h1>

<form method="post" action="{{ url_for('staff.edit', id=member['id']) if member else url_for('staff.create') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ member['name'] if member else '' }}" required>
    </div>

    <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select class="form-select" id="role" name="role" required>
            {% set roles = ['chef', 'sous_chef', 'server', 'host', 'busser', 'manager'] %}
            {% for r in roles %}
            <option value="{{ r }}" {% if member and member['role'] == r %}selected{% endif %}>
                {{ r | replace('_', ' ') | title }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="phone" class="form-label">Phone</label>
        <input type="text" class="form-control" id="phone" name="phone"
               value="{{ member['phone'] if member else '' }}">
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email"
               value="{{ member['email'] if member else '' }}">
    </div>

    {% if member %}
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="is_active" name="is_active"
               {% if member['is_active'] %}checked{% endif %}>
        <label class="form-check-label" for="is_active">Active</label>
    </div>
    {% endif %}

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('staff.list_staff') }}" class="btn btn-secondary">Cancel</a>
</form>

{% if member %}
<hr>
<form method="post" action="{{ url_for('staff.delete', id=member['id']) }}"
      onsubmit="return confirm('Are you sure you want to delete this staff member?');">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-danger">Delete Staff Member</button>
</form>
{% endif %}
{% endblock %}
