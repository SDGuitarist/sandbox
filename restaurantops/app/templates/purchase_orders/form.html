{% extends "base.html" %}

{% block title %}{{ 'Edit' if order else 'New' }} Purchase Order - RestaurantOps{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{{ 'Edit' if order else 'New' }} Purchase Order</h1>

    <form method="POST" action="{{ url_for('purchase_orders.edit', id=order['id']) if order else url_for('purchase_orders.create') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
            <label for="supplier_id" class="form-label">Supplier</label>
            <select class="form-select" id="supplier_id" name="supplier_id" required>
                <option value="">-- Select Supplier --</option>
                {% for s in suppliers %}
                <option value="{{ s['id'] }}" {% if order and order['supplier_id'] == s['id'] %}selected{% endif %}>
                    {{ s['name'] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="3">{{ order['notes'] if order and order['notes'] else '' }}</textarea>
        </div>

        <h3>Line Items</h3>
        <div id="line-items">
            {% if items %}
            {% for item in items %}
            <div class="row mb-2 line-item">
                <div class="col-md-4">
                    <select class="form-select" name="ingredient_ids[]" required>
                        <option value="">-- Ingredient --</option>
                        {% for ing in ingredients %}
                        <option value="{{ ing['id'] }}" {% if ing['id'] == item['ingredient_id'] %}selected{% endif %}>
                            {{ ing['name'] }} ({{ ing['unit'] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" class="form-control" name="quantities[]" placeholder="Quantity" step="any" min="0.01" value="{{ item['quantity'] }}" required>
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control" name="unit_costs[]" placeholder="Unit Cost ($)" value="{{ '%.2f'|format(item['unit_cost_cents'] / 100) }}" required>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-danger remove-line" onclick="this.closest('.line-item').remove()">Remove</button>
                </div>
            </div>
            {% endfor %}
            {% endif %}
        </div>

        <button type="button" class="btn btn-outline-secondary mb-3" id="add-line-btn">Add Line Item</button>

        <div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('purchase_orders.detail', id=order['id']) if order else url_for('purchase_orders.list_orders') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<template id="line-item-template">
    <div class="row mb-2 line-item">
        <div class="col-md-4">
            <select class="form-select" name="ingredient_ids[]" required>
                <option value="">-- Ingredient --</option>
                {% for ing in ingredients %}
                <option value="{{ ing['id'] }}">{{ ing['name'] }} ({{ ing['unit'] }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <input type="number" class="form-control" name="quantities[]" placeholder="Quantity" step="any" min="0.01" required>
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control" name="unit_costs[]" placeholder="Unit Cost ($)" required>
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-outline-danger remove-line" onclick="this.closest('.line-item').remove()">Remove</button>
        </div>
    </div>
</template>

<script>
document.getElementById('add-line-btn').addEventListener('click', function() {
    var template = document.getElementById('line-item-template');
    var clone = template.content.cloneNode(true);
    document.getElementById('line-items').appendChild(clone);
});
</script>
{% endblock %}
