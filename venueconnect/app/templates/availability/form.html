{% extends "base.html" %}
{% block title %}Add Availability - {{ room['name'] }}{% endblock %}

{% block content %}
<h1>Add Availability Window</h1>
<p class="text-muted">Room: {{ room['name'] }}</p>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="day_of_week" class="form-label">Day of Week</label>
        <select class="form-select" id="day_of_week" name="day_of_week" required>
            <option value="">-- Select Day --</option>
            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4">Friday</option>
            <option value="5">Saturday</option>
            <option value="6">Sunday</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="start_time" class="form-label">Start Time</label>
        <input type="time" class="form-control" id="start_time" name="start_time" required>
    </div>

    <div class="mb-3">
        <label for="end_time" class="form-label">End Time</label>
        <input type="time" class="form-control" id="end_time" name="end_time" required>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Add Window</button>
        <a href="{{ url_for('availability.calendar', room_id=room['id']) }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
