{% extends "base.html" %}
{% block title %}Promoter Analytics{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<h1>Promoter Analytics</h1>
<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card"><div class="card-body">
            <h5 class="card-title">Revenue by Month</h5>
            <canvas id="revenueChart"></canvas>
        </div></div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card"><div class="card-body">
            <h5 class="card-title">Settlements by Venue</h5>
            <canvas id="settlementsChart"></canvas>
        </div></div>
    </div>
</div>
<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card"><div class="card-body">
            <h5 class="card-title">Event Status Counts</h5>
            <canvas id="statusChart"></canvas>
        </div></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Bar chart -- revenue by month
var revenueData = {{ revenue_data|tojson }};
new Chart(document.getElementById('revenueChart'), {
    type: 'bar',
    data: {
        labels: revenueData.map(function(r) { return r.month; }),
        datasets: [{
            label: 'Revenue',
            data: revenueData.map(function(r) { return r.total_cents / 100; }),
            backgroundColor: 'rgba(54, 162, 235, 0.7)'
        }]
    },
    options: { responsive: true, scales: { y: { beginAtZero: true,
        ticks: { callback: function(v) { return '$' + v.toLocaleString(); } }
    }}}
});

// Horizontal bar chart -- settlements by venue
var settlementsData = {{ settlements_data|tojson }};
new Chart(document.getElementById('settlementsChart'), {
    type: 'bar',
    data: {
        labels: settlementsData.map(function(r) { return r.venue_name; }),
        datasets: [{
            label: 'Door Revenue',
            data: settlementsData.map(function(r) { return r.total_cents / 100; }),
            backgroundColor: 'rgba(75, 192, 192, 0.7)'
        }]
    },
    options: { responsive: true, indexAxis: 'y', scales: { x: { beginAtZero: true,
        ticks: { callback: function(v) { return '$' + v.toLocaleString(); } }
    }}}
});

// Doughnut chart -- event status counts
var statusData = {{ status_data|tojson }};
new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
        labels: statusData.map(function(r) { return r.status; }),
        datasets: [{
            data: statusData.map(function(r) { return r.count; }),
            backgroundColor: ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF',
                              '#FF9F40','#C9CBCF','#7BC67E','#E7E9ED','#FFB1C1']
        }]
    },
    options: { responsive: true }
});
</script>
{% endblock %}
