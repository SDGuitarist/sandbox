{% extends "base.html" %}
{% block title %}{{ 'Edit Event' if event else 'Create Event' }}{% endblock %}

{% block content %}
<h1>{{ 'Edit Event' if event else 'Create Event' }}</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    {% if not event %}
    <div class="mb-3">
        <label for="venue_id" class="form-label">Venue</label>
        <select class="form-select" id="venue_id" name="venue_id" required>
            <option value="">Select a venue...</option>
            {% for venue in venues %}
            <option value="{{ venue['id'] }}">{{ venue['name'] }}</option>
            {% endfor %}
        </select>
    </div>
    {% endif %}

    <div class="mb-3">
        <label for="name" class="form-label">Event Name</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ event['name'] if event else '' }}" required>
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ event['description'] if event else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label for="event_date" class="form-label">Event Date</label>
        <input type="date" class="form-control" id="event_date" name="event_date"
               value="{{ event['event_date'] if event else '' }}" required>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ 'Update Event' if event else 'Create Event' }}</button>
        {% if event %}
        <a href="{{ url_for('events.detail', id=event['id']) }}" class="btn btn-outline-secondary">Cancel</a>
        {% else %}
        <a href="{{ url_for('events.list') }}" class="btn btn-outline-secondary">Cancel</a>
        {% endif %}
    </div>
</form>
{% endblock %}
