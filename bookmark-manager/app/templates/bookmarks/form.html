{% extends "layout.html" %}

{% block title %}{% if is_edit %}Edit Bookmark{% else %}Add Bookmark{% endif %}{% endblock %}

{% block content %}
<h1>{% if is_edit %}Edit Bookmark{% else %}Add Bookmark{% endif %}</h1>

<form method="post" action="{{ url_for('bookmarks.update_bookmark_route', id=bookmark['id']) if is_edit else url_for('bookmarks.create_bookmark_route') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
        <label for="url">URL</label>
        <input type="text" id="url" name="url" value="{{ bookmark['url'] if is_edit and bookmark else '' }}" required placeholder="https://example.com">
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ bookmark['title'] if is_edit and bookmark else '' }}" placeholder="Leave empty to auto-fetch from URL">
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" placeholder="Optional description">{{ bookmark['description'] if is_edit and bookmark else '' }}</textarea>
    </div>

    <div class="form-group">
        <label for="tags">Tags</label>
        <input type="text" id="tags" name="tags" value="{{ tags_str }}" placeholder="python, flask, tutorial">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{% if is_edit %}Update Bookmark{% else %}Add Bookmark{% endif %}</button>
        <a href="{{ url_for('bookmarks.index') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
