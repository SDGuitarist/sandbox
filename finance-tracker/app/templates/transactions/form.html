{% extends "layout.html" %}

{% block title %}{% if is_edit %}Edit Transaction{% else %}New Transaction{% endif %} - Finance Tracker{% endblock %}

{% block content %}
<h1>{% if is_edit %}Edit Transaction{% else %}New Transaction{% endif %}</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" step="0.01" min="0.01" id="amount" name="amount" required
            {% if is_edit %}value="{{ '%.2f'|format(transaction.amount / 100) }}"{% endif %}>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" name="description" maxlength="200" required
            value="{{ transaction.description if is_edit else '' }}">
    </div>

    <div class="form-group">
        <label for="transaction_date">Date</label>
        <input type="date" id="transaction_date" name="transaction_date" required
            value="{{ transaction.transaction_date if is_edit else today }}">
    </div>

    <div class="form-group">
        <label for="category_id">Category</label>
        <select id="category_id" name="category_id" required>
            {% for cat in categories %}
                <option value="{{ cat.id }}" {% if is_edit and transaction.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">{% if is_edit %}Update{% else %}Add{% endif %}</button>
        <a href="{{ url_for('transactions.index') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
