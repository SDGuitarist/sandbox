<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finance Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="container">
            <a href="{{ url_for('views.dashboard') }}" class="nav-brand">Finance Tracker</a>
            <div class="nav-links">
                <a href="{{ url_for('views.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('transactions.index') }}">Transactions</a>
                <a href="{{ url_for('categories.index') }}">Categories</a>
                <a href="{{ url_for('views.budgets_manage') }}">Budgets</a>
            </div>
        </div>
    </nav>
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
