{% extends "layout.html" %}

{% block title %}{% if is_edit %}Edit Category{% else %}New Category{% endif %} - Finance Tracker{% endblock %}

{% block content %}
<h1>{% if is_edit %}Edit Category{% else %}New Category{% endif %}</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" maxlength="50" required
            value="{{ category.name if is_edit else '' }}"
            {% if is_edit and category.id == 1 %}readonly{% endif %}>
    </div>

    <div class="form-group">
        <label for="color">Color</label>
        <input type="color" id="color" name="color"
            value="{{ category.color if is_edit else '#6c757d' }}">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">{% if is_edit %}Update{% else %}Create{% endif %}</button>
        <a href="{{ url_for('categories.index') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
