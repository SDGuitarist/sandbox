{% extends "base.html" %}

{% block title %}{{ 'Edit' if category else 'New' }} Category — Project Tracker{% endblock %}

{% block content %}
<h1>{{ 'Edit' if category else 'New' }} Category</h1>

<form method="POST" action="{{ url_for('categories.edit', category_id=category['id']) if category else url_for('categories.new') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" class="form-control"
               maxlength="100" required
               value="{{ category['name'] if category else '' }}">
    </div>

    <div class="form-group">
        <label for="color">Color</label>
        <input type="color" id="color" name="color" class="form-control"
               value="{{ category['color'] if category else '#6366f1' }}">
    </div>

    <button type="submit" class="btn btn-primary">{{ 'Update' if category else 'Create' }} Category</button>
    <a class="btn" href="{{ url_for('categories.list') }}">Cancel</a>
</form>
{% endblock %}
