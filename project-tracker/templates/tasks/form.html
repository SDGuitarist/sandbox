{% extends "base.html" %}

{% block title %}{% if task %}Edit Task{% else %}New Task{% endif %} - Project Tracker{% endblock %}

{% block content %}
<h1>{% if task %}Edit Task{% else %}New Task{% endif %}</h1>

<form method="post" action="{% if task %}{{ url_for('tasks.edit', task_id=task.id) }}{% else %}{{ url_for('tasks.new') }}{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="title">Title</label>
        <input class="form-control" type="text" id="title" name="title" maxlength="100"
               value="{{ task.title if task else '' }}" required>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea class="form-control" id="description" name="description" rows="4" maxlength="2000">{{ task.description if task else '' }}</textarea>
    </div>

    <div class="form-group">
        <label for="status">Status</label>
        <select class="form-control" id="status" name="status">
            <option value="todo" {% if task and task.status == 'todo' %}selected{% endif %}>Todo</option>
            <option value="in_progress" {% if task and task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
            <option value="done" {% if task and task.status == 'done' %}selected{% endif %}>Done</option>
        </select>
    </div>

    <div class="form-group">
        <label for="due_date">Due Date</label>
        <input class="form-control" type="date" id="due_date" name="due_date"
               value="{{ task.due_date if task and task.due_date else '' }}">
    </div>

    <div class="form-group">
        <label for="category_id">Category</label>
        <select class="form-control" id="category_id" name="category_id" required>
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if task and task.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-primary" type="submit">{% if task %}Update{% else %}Create{% endif %}</button>
    <a class="btn" href="{% if task %}{{ url_for('tasks.detail', task_id=task.id) }}{% else %}{{ url_for('tasks.list') }}{% endif %}">Cancel</a>
</form>
{% endblock %}
