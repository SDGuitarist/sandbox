{% extends "base.html" %}

{% block title %}{% if member %}Edit Member{% else %}New Member{% endif %} - Project Tracker{% endblock %}

{% block content %}
<h1>{% if member %}Edit Member{% else %}New Member{% endif %}</h1>

<form method="post" action="{% if member %}{{ url_for('members.edit', member_id=member['id']) }}{% else %}{{ url_for('members.create') }}{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="name">Name</label>
        <input class="form-control" type="text" id="name" name="name" value="{{ member['name'] if member else '' }}" required>
    </div>

    <div class="form-group">
        <label for="role">Role</label>
        <input class="form-control" type="text" id="role" name="role" value="{{ member['role'] if member else '' }}">
    </div>

    <button class="btn btn-primary" type="submit">{% if member %}Update{% else %}Create{% endif %}</button>
</form>
{% endblock %}
