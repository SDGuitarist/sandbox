{% extends "base.html" %}

{% block title %}{% if recipe %}Edit Recipe{% else %}New Recipe{% endif %}{% endblock %}

{% block content %}
<h1>{% if recipe %}Edit Recipe{% else %}New Recipe{% endif %}</h1>

<form method="post" action="{% if recipe %}{{ url_for('recipes.update', recipe_id=recipe['id']) }}{% else %}{{ url_for('recipes.create') }}{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ recipe['name'] if recipe else '' }}" required maxlength="200">
    </div>

    <div class="mb-3">
        <label for="style" class="form-label">Style</label>
        <input type="text" class="form-control" id="style" name="style"
               value="{{ recipe['style'] if recipe else '' }}" maxlength="100">
    </div>

    <div class="mb-3">
        <label for="target_abv" class="form-label">Target ABV (%)</label>
        <input type="number" class="form-control" id="target_abv" name="target_abv"
               value="{{ recipe['target_abv'] if recipe and recipe['target_abv'] is not none else '' }}"
               step="0.1" min="0" max="100">
    </div>

    <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea class="form-control" id="notes" name="notes" rows="4">{{ recipe['notes'] if recipe else '' }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
            {% if recipe %}Update Recipe{% else %}Create Recipe{% endif %}
        </button>
        <a href="{% if recipe %}{{ url_for('recipes.detail', recipe_id=recipe['id']) }}{% else %}{{ url_for('recipes.list') }}{% endif %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
