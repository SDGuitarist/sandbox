{% extends "base.html" %}

{% block title %}{% if tap %}Edit Tap{% else %}New Tap{% endif %}{% endblock %}

{% block content %}
<h1>{% if tap %}Edit Tap{% else %}New Tap{% endif %}</h1>

<form method="POST" action="{% if tap %}{{ url_for('taps.update', tap_id=tap.id) }}{% else %}{{ url_for('taps.create') }}{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ tap.name if tap else '' }}" required maxlength="100">
    </div>

    <div class="mb-3">
        <label for="position" class="form-label">Position</label>
        <input type="number" class="form-control" id="position" name="position"
               value="{{ tap.position if tap else '' }}" required min="1">
        <div class="form-text">Tap position number (must be unique, positive integer).</div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{% if tap %}Update{% else %}Create{% endif %} Tap</button>
        <a href="{% if tap %}{{ url_for('taps.detail', tap_id=tap.id) }}{% else %}{{ url_for('taps.list') }}{% endif %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
