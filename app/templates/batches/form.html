{% extends "base.html" %}

{% block title %}{{ 'Edit Batch' if batch else 'New Batch' }}{% endblock %}

{% block content %}
<h1>{{ 'Edit Batch' if batch else 'New Batch' }}</h1>

<form method="POST" action="{{ url_for('batches.update', batch_id=batch['id']) if batch else url_for('batches.create') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    {% if not batch %}
    <div class="mb-3">
        <label for="recipe_id" class="form-label">Recipe</label>
        <select name="recipe_id" id="recipe_id" class="form-select" required>
            <option value="">Select a recipe</option>
            {% for recipe in recipes %}
            <option value="{{ recipe['id'] }}">{{ recipe['name'] }}</option>
            {% endfor %}
        </select>
    </div>
    {% endif %}

    <div class="mb-3">
        <label for="name" class="form-label">Batch Name</label>
        <input type="text" name="name" id="name" class="form-control"
               value="{{ batch['name'] if batch else '' }}" required maxlength="200">
    </div>

    {% if not batch %}
    <div class="mb-3">
        <label for="volume_gallons" class="form-label">Volume (gallons)</label>
        <input type="number" name="volume_gallons" id="volume_gallons" class="form-control"
               step="0.1" min="0.1" required>
    </div>
    {% endif %}

    <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea name="notes" id="notes" class="form-control" rows="3">{{ batch['notes'] if batch else '' }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ 'Update' if batch else 'Create' }} Batch</button>
        <a href="{{ url_for('batches.detail', batch_id=batch['id']) if batch else url_for('batches.list') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
