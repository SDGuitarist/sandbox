{% extends "base.html" %}

{% block title %}{% if tank %}Edit Tank{% else %}New Tank{% endif %}{% endblock %}

{% block content %}
<h1>{% if tank %}Edit Tank{% else %}New Tank{% endif %}</h1>

<form method="POST" action="{% if tank %}{{ url_for('tanks.update', tank_id=tank['id']) }}{% else %}{{ url_for('tanks.create') }}{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ tank['name'] if tank else '' }}" required maxlength="100">
    </div>

    <div class="mb-3">
        <label for="tank_type" class="form-label">Type</label>
        <select class="form-select" id="tank_type" name="tank_type" required>
            <option value="">Select type...</option>
            {% for tt in tank_types %}
            <option value="{{ tt }}" {% if tank and tank['tank_type'] == tt %}selected{% endif %}>{{ tt|capitalize }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="capacity_gallons" class="form-label">Capacity (gallons)</label>
        <input type="number" class="form-control" id="capacity_gallons" name="capacity_gallons"
               value="{{ tank['capacity_gallons'] if tank else '' }}" step="any" min="0.01" required>
    </div>

    <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea class="form-control" id="notes" name="notes" rows="3">{{ tank['notes'] if tank else '' }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{% if tank %}Update{% else %}Create{% endif %}</button>
        <a href="{% if tank %}{{ url_for('tanks.detail', tank_id=tank['id']) }}{% else %}{{ url_for('tanks.list') }}{% endif %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
