{% extends "base.html" %}

{% block title %}Add Cast Member - {{ project['title'] }}{% endblock %}

{% block content %}
<h1>Add Cast Member</h1>

<div class="card bg-dark border-secondary mt-3">
    <div class="card-body">
        <form method="POST" action="{{ url_for('cast.create', project_id=project['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="name" class="form-label">Actor Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="character_name" class="form-label">Character Name</label>
                <input type="text" class="form-control" id="character_name" name="character_name" required>
            </div>

            <div class="mb-3">
                <label for="cast_id_number" class="form-label">Cast ID Number (1-99)</label>
                <input type="number" class="form-control" id="cast_id_number" name="cast_id_number"
                       min="1" max="99" required>
                <div class="form-text">Unique number used on call sheets and DOOD reports.</div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Add Cast Member</button>
                <a href="{{ url_for('cast.list', project_id=project['id']) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
