{% extends "base.html" %}
{% block title %}New Cast Member — {{ project['title'] }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">New Cast Member</h1>
  <a class="btn btn-outline-secondary" href="{{ url_for('cast.list', project_id=project['id']) }}">Back to Cast</a>
</div>

<div class="card bg-dark border-secondary">
  <div class="card-body">
    <form method="POST" action="{{ url_for('cast.create', project_id=project['id']) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" maxlength="200" required>
      </div>

      <div class="mb-3">
        <label for="character_name" class="form-label">Character</label>
        <input type="text" class="form-control" id="character_name" name="character_name" maxlength="200" required>
      </div>

      <div class="mb-3">
        <label for="cast_id_number" class="form-label">Cast ID Number</label>
        <input type="number" class="form-control" id="cast_id_number" name="cast_id_number"
               min="1" max="99" required>
        <div class="form-text">A number from 1 to 99, unique within this project.</div>
      </div>

      <button type="submit" class="btn btn-primary">Add Cast Member</button>
    </form>
  </div>
</div>
{% endblock %}
