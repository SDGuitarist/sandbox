{% extends "base.html" %}

{% block title %}{% if ingredient %}Edit Ingredient{% else %}New Ingredient{% endif %}{% endblock %}

{% block content %}
<h1>{% if ingredient %}Edit Ingredient{% else %}New Ingredient{% endif %}</h1>

<form method="POST" action="{% if ingredient %}{{ url_for('ingredients.update', ingredient_id=ingredient['id']) }}{% else %}{{ url_for('ingredients.create') }}{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" required maxlength="200"
               value="{{ ingredient['name'] if ingredient else '' }}">
    </div>

    <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <select class="form-select" id="category" name="category" required>
            <option value="">Select a category</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if ingredient and ingredient['category'] == cat %}selected{% endif %}>{{ cat|capitalize }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="stock_qty" class="form-label">Stock Quantity</label>
        <input type="number" class="form-control" id="stock_qty" name="stock_qty" step="any" min="0"
               value="{{ ingredient['stock_qty'] if ingredient else '0' }}">
    </div>

    <div class="mb-3">
        <label for="unit" class="form-label">Unit</label>
        <input type="text" class="form-control" id="unit" name="unit"
               value="{{ ingredient['unit'] if ingredient else 'lb' }}">
    </div>

    <div class="mb-3">
        <label for="low_stock_threshold" class="form-label">Low Stock Threshold</label>
        <input type="number" class="form-control" id="low_stock_threshold" name="low_stock_threshold" step="any" min="0"
               value="{{ ingredient['low_stock_threshold'] if ingredient else '5.0' }}">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{% if ingredient %}Update{% else %}Create{% endif %}</button>
        <a href="{% if ingredient %}{{ url_for('ingredients.detail', ingredient_id=ingredient['id']) }}{% else %}{{ url_for('ingredients.list') }}{% endif %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
