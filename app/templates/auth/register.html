{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <h1 class="card-title h4 mb-4">Register</h1>
        <form method="post" action="{{ url_for('auth.register_post') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   required minlength="3" maxlength="50" autofocus autocomplete="username">
            <div class="form-text">3-50 characters.</div>
          </div>
          <div class="mb-3">
            <label for="display_name" class="form-label">Display Name</label>
            <input type="text" class="form-control" id="display_name" name="display_name"
                   required minlength="1" maxlength="100" autocomplete="name">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   required minlength="8" autocomplete="new-password">
            <div class="form-text">At least 8 characters.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="mt-3 mb-0 text-center">
          Already have an account? <a href="{{ url_for('auth.login') }}">Log In</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
