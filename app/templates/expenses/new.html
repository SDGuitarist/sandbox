{% extends "base.html" %}

{% block title %}New Expense - {{ project['title'] }}{% endblock %}

{% block content %}
<h2>New Expense</h2>

<div class="card bg-dark border-secondary">
    <div class="card-body">
        <form method="POST" action="{{ url_for('expenses.create', project_id=project['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="department_id" class="form-label">Department</label>
                <select name="department_id" id="department_id" class="form-select" required>
                    <option value="">Select department...</option>
                    {% for dept in departments %}
                    <option value="{{ dept['id'] }}">{{ dept['name'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="amount" class="form-label">Amount ($)</label>
                <input type="number" name="amount" id="amount" class="form-control"
                       step="0.01" min="0.01" required
                       placeholder="0.00">
            </div>

            <div class="mb-3">
                <label for="vendor" class="form-label">Vendor</label>
                <input type="text" name="vendor" id="vendor" class="form-control"
                       required placeholder="Vendor name">
            </div>

            <div class="mb-3">
                <label for="expense_date" class="form-label">Date</label>
                <input type="date" name="expense_date" id="expense_date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="category_id" class="form-label">Budget Category (optional)</label>
                <select name="category_id" id="category_id" class="form-select">
                    <option value="">None</option>
                    {% for cat in categories %}
                    <option value="{{ cat['id'] }}">{{ cat['account_number'] }} - {{ cat['name'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description (optional)</label>
                <textarea name="description" id="description" class="form-control" rows="3"
                          placeholder="Expense description"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Create Expense</button>
                <a href="{{ url_for('expenses.list', project_id=project['id']) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
