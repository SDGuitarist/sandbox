{% extends "base.html" %}

{% block title %}Log Expense — {{ project['title'] }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Log Expense</h1>
    <a href="{{ url_for('expenses.list', project_id=project['id']) }}"
       class="btn btn-outline-secondary">Back to Expenses</a>
</div>

<div class="card bg-dark border-secondary">
    <div class="card-body">
        <form method="POST"
              action="{{ url_for('expenses.create', project_id=project['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="department_id" class="form-label">Department</label>
                <select class="form-select" id="department_id" name="department_id" required>
                    <option value="" disabled selected>Select a department…</option>
                    {% for dept in departments %}
                    <option value="{{ dept['id'] }}">{{ dept['name'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="amount" class="form-label">Amount (USD)</label>
                <input type="number" step="0.01" min="0.01" class="form-control"
                       id="amount" name="amount" placeholder="0.00" required>
            </div>

            <div class="mb-3">
                <label for="vendor" class="form-label">Vendor</label>
                <input type="text" class="form-control" id="vendor" name="vendor"
                       maxlength="200" required>
            </div>

            <div class="mb-3">
                <label for="expense_date" class="form-label">Expense Date</label>
                <input type="date" class="form-control" id="expense_date"
                       name="expense_date" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description <span class="text-secondary">(optional)</span></label>
                <textarea class="form-control" id="description" name="description"
                          rows="2"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Log Expense</button>
        </form>
    </div>
</div>
{% endblock %}
