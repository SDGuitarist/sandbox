{% extends "base.html" %}
{% block title %}New Scene{% endblock %}
{% block content %}
<h1 class="h3 mb-3">New Scene</h1>

<div class="card bg-dark border-secondary">
  <div class="card-body">
    <form method="POST" action="{{ url_for('scenes.create', project_id=project.id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label" for="scene_number">Scene Number</label>
        <input class="form-control" type="text" id="scene_number" name="scene_number" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="description">Description</label>
        <textarea class="form-control" id="description" name="description" rows="2"></textarea>
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label" for="int_ext">INT/EXT</label>
          <select class="form-select" id="int_ext" name="int_ext" required>
            {% for v in int_ext_values %}
            <option value="{{ v }}">{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label" for="day_night">Day/Night</label>
          <select class="form-select" id="day_night" name="day_night" required>
            {% for v in day_night_values %}
            <option value="{{ v }}">{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label" for="page_count_eighths">Page Count (eighths)</label>
          <input class="form-control" type="number" min="1" step="1"
                 id="page_count_eighths" name="page_count_eighths" value="8" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="location_id">Location</label>
        <select class="form-select" id="location_id" name="location_id">
          <option value="">— None —</option>
          {% for loc in locations %}
          <option value="{{ loc.id }}">{{ loc.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create Scene</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('scenes.list', project_id=project.id) }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
