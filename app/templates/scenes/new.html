{% extends "base.html" %}

{% block title %}New Scene — {{ project.title }}{% endblock %}

{% block content %}
<h1>New Scene</h1>

<div class="card bg-dark border-secondary">
    <div class="card-body">
        <form method="POST" action="{{ url_for('scenes.create', project_id=project.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="scene_number" class="form-label">Scene Number</label>
                <input type="text" class="form-control" id="scene_number" name="scene_number" required>
                <div class="form-text">E.g. "1", "2A", "45B"</div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="int_ext" class="form-label">INT/EXT</label>
                    <select class="form-select" id="int_ext" name="int_ext" required>
                        <option value="">Select...</option>
                        <option value="INT">INT</option>
                        <option value="EXT">EXT</option>
                        <option value="INT/EXT">INT/EXT</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="day_night" class="form-label">Day/Night</label>
                    <select class="form-select" id="day_night" name="day_night" required>
                        <option value="">Select...</option>
                        <option value="DAY">DAY</option>
                        <option value="NIGHT">NIGHT</option>
                        <option value="DAWN">DAWN</option>
                        <option value="DUSK">DUSK</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="page_count_eighths" class="form-label">Page Count (1/8ths)</label>
                    <input type="number" class="form-control" id="page_count_eighths"
                           name="page_count_eighths" min="1" value="8" required>
                    <div class="form-text">8 = 1 full page</div>
                </div>
            </div>

            <div class="mb-3">
                <label for="location_id" class="form-label">Location</label>
                <select class="form-select" id="location_id" name="location_id">
                    <option value="">No location assigned</option>
                    {% for loc in locations %}
                    <option value="{{ loc.id }}">{{ loc.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Create Scene</button>
                <a href="{{ url_for('scenes.list', project_id=project.id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
