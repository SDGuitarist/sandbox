{% extends "base.html" %}

{% block title %}New Line Item — {{ project['title'] }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">New Budget Line Item</h1>
    <a href="{{ url_for('budget.index', project_id=project['id']) }}" class="btn btn-outline-light btn-sm">Cancel</a>
</div>

<div class="card bg-dark border-secondary">
    <div class="card-body">
        <form method="POST" action="{{ url_for('budget.create_line_item', project_id=project['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label" for="category_id">Category</label>
                <select class="form-select" id="category_id" name="category_id" required>
                    <option value="">Select a category…</option>
                    {% for category in categories %}
                    <option value="{{ category['id'] }}">{{ category['account_number'] }} — {{ category['name'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label" for="description">Description</label>
                <input type="text" class="form-control" id="description" name="description" maxlength="500" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="estimated">Estimated ($)</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="estimated" name="estimated" value="0" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="actual">Actual ($)</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="actual" name="actual" value="0">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Create Line Item</button>
        </form>
    </div>
</div>
{% endblock %}
