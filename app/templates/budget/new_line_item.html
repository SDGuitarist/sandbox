{% extends "base.html" %}

{% block title %}New Line Item - {{ project['title'] }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>New Budget Line Item</h1>
        <a href="{{ url_for('budget.index', project_id=project['id']) }}" class="btn btn-outline-light">Cancel</a>
    </div>

    <div class="card bg-dark border-secondary">
        <div class="card-body">
            <form method="POST" action="{{ url_for('budget.create_line_item', project_id=project['id']) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="category_id" class="form-label">Budget Category</label>
                    <select name="category_id" id="category_id" class="form-select" required>
                        <option value="">Select category...</option>
                        {% for cat in categories %}
                        <option value="{{ cat['id'] }}">{{ cat['account_number'] }} - {{ cat['name'] }} ({{ cat['parent_group'] }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <input type="text" name="description" id="description" class="form-control" required placeholder="e.g. Director's fee, Camera rental">
                </div>

                <div class="mb-3">
                    <label for="estimated_cents" class="form-label">Estimated Amount ($)</label>
                    <input type="number" step="0.01" min="0" name="estimated_cents" id="estimated_cents" class="form-control" required placeholder="0.00">
                </div>

                <button type="submit" class="btn btn-primary">Create Line Item</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
