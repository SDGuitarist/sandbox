{% extends "base.html" %}

{% block title %}New Crew Member — {{ project['title'] }}{% endblock %}

{% block content %}
<h1>Add Crew Member</h1>

<div class="card bg-dark border-secondary mt-3">
    <div class="card-body">
        <form method="POST" action="{{ url_for('crew.create', project_id=project['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="role_title" class="form-label">Role / Title</label>
                <input type="text" class="form-control" id="role_title" name="role_title"
                       placeholder="e.g. Gaffer, Key Grip, 1st AC" required>
            </div>

            <div class="mb-3">
                <label for="department_id" class="form-label">Department</label>
                <select class="form-select" id="department_id" name="department_id" required>
                    <option value="">Select department...</option>
                    {% for dept in departments %}
                    <option value="{{ dept['id'] }}">{{ dept['name'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="tel" class="form-control" id="phone" name="phone">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>

            <div class="mb-3">
                <label for="daily_rate" class="form-label">Daily Rate ($)</label>
                <input type="number" class="form-control" id="daily_rate" name="daily_rate"
                       step="0.01" min="0" value="0.00">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Add Crew Member</button>
                <a href="{{ url_for('crew.list', project_id=project['id']) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
