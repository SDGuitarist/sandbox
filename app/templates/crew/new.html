{% extends "base.html" %}

{% block title %}Add Crew Member{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Add Crew Member</h1>
  <a href="{{ url_for('crew.list', project_id=g.project.id) }}"
     class="btn btn-outline-secondary">Back to Crew</a>
</div>

<div class="card bg-dark border-secondary">
  <div class="card-body">
    <form method="post" action="{{ url_for('crew.create', project_id=g.project.id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               maxlength="200" required>
      </div>

      <div class="mb-3">
        <label for="role_title" class="form-label">Role / Title</label>
        <input type="text" class="form-control" id="role_title" name="role_title"
               maxlength="200" required>
      </div>

      <div class="mb-3">
        <label for="department_id" class="form-label">Department</label>
        <select class="form-select" id="department_id" name="department_id" required>
          {% for d in departments %}
          <option value="{{ d.id }}">{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="phone" class="form-label">Phone</label>
          <input type="text" class="form-control" id="phone" name="phone"
                 maxlength="50">
        </div>
        <div class="col-md-6 mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email"
                 maxlength="200">
        </div>
      </div>

      <div class="mb-3">
        <label for="daily_rate" class="form-label">Daily Rate (USD)</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" step="0.01" min="0" class="form-control"
                 id="daily_rate" name="daily_rate" placeholder="0.00">
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Add Crew Member</button>
    </form>
  </div>
</div>
{% endblock %}
