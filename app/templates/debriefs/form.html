{% extends "base.html" %}

{% block content %}
  {% if debrief %}
    <h1>Edit Debrief</h1>
    <form method="post" action="{{ url_for('debriefs.edit', gig_id=gig['id']) }}">
  {% else %}
    <h1>New Debrief</h1>
    <form method="post" action="{{ url_for('debriefs.new', gig_id=gig['id']) }}">
  {% endif %}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <p>Gig: {{ gig['date'] }}{% if gig['client_name'] %} — {{ gig['client_name'] }}{% endif %}</p>

    <p>
      <label for="raw_text">Debrief text (required)</label><br>
      <textarea id="raw_text" name="raw_text" rows="8" required>{% if form %}{{ form.get('raw_text', '') }}{% elif debrief %}{{ debrief['raw_text'] }}{% endif %}</textarea>
    </p>

    <p>
      <label for="key_takeaways">Key takeaways</label><br>
      <textarea id="key_takeaways" name="key_takeaways" rows="4">{% if form %}{{ form.get('key_takeaways', '') }}{% elif debrief %}{{ debrief['key_takeaways'] or '' }}{% endif %}</textarea>
    </p>

    <p>
      <label for="lessons_learned">Lessons learned</label><br>
      <textarea id="lessons_learned" name="lessons_learned" rows="4">{% if form %}{{ form.get('lessons_learned', '') }}{% elif debrief %}{{ debrief['lessons_learned'] or '' }}{% endif %}</textarea>
    </p>

    <p>
      <button type="submit">Save</button>
      <a href="{{ url_for('gigs.detail', id=gig['id']) }}">Cancel</a>
    </p>
  </form>
{% endblock %}
