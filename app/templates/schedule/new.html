{% extends "base.html" %}

{% block title %}Add to Schedule - {{ project['title'] }}{% endblock %}

{% block content %}
<h2>Add Scene to Schedule</h2>
<p>
    <a href="{{ url_for('schedule.index', project_id=project['id']) }}" class="text-decoration-none">
        &larr; Back to Schedule
    </a>
</p>

<div class="card bg-dark border-secondary">
    <div class="card-body">
        <form method="POST" action="{{ url_for('schedule.create', project_id=project['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="scene_id" class="form-label">Scene</label>
                <select name="scene_id" id="scene_id" class="form-select" required>
                    <option value="">-- Select a scene --</option>
                    {% for scene in scenes %}
                    <option value="{{ scene['id'] }}">
                        {{ scene['scene_number'] }} - {{ scene['int_ext'] }} {{ scene['day_night'] }}
                        {% if scene['description'] %} - {{ scene['description'][:50] }}{% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="location_id" class="form-label">Location (optional)</label>
                <select name="location_id" id="location_id" class="form-select">
                    <option value="">-- No location --</option>
                    {% for loc in locations %}
                    <option value="{{ loc['id'] }}">{{ loc['name'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="shoot_date" class="form-label">Shoot Date</label>
                <input type="date" name="shoot_date" id="shoot_date" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Add to Schedule</button>
        </form>
    </div>
</div>
{% endblock %}
