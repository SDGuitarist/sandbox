{% extends "base.html" %}

{% block title %}Add Scene to Schedule{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="{{ url_for('schedule.index', project_id=project['id']) }}"
     class="text-decoration-none">&larr; Schedule</a>
  <h1 class="h3 mb-0 mt-1">Add Scene to Schedule</h1>
</div>

<div class="card bg-dark border-secondary">
  <div class="card-body">
    <form method="POST" action="{{ url_for('schedule.create', project_id=project['id']) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label for="scene_id" class="form-label">Scene</label>
        <select class="form-select" id="scene_id" name="scene_id" required>
          <option value="">Select a scene…</option>
          {% for scene in scenes %}
          <option value="{{ scene['id'] }}">
            {{ scene['scene_number'] }} —
            {{ scene['int_ext'] }}/{{ scene['day_night'] }}
            {% if scene['description'] %} — {{ scene['description'] }}{% endif %}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label for="location_id" class="form-label">Location</label>
        <select class="form-select" id="location_id" name="location_id">
          <option value="">No location</option>
          {% for location in locations %}
          <option value="{{ location['id'] }}">{{ location['name'] }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label for="shoot_date" class="form-label">Shoot Date</label>
        <input type="date" class="form-control" id="shoot_date" name="shoot_date"
               pattern="\d{4}-\d{2}-\d{2}" required>
      </div>

      <button type="submit" class="btn btn-primary">Add to Schedule</button>
      <a href="{{ url_for('schedule.index', project_id=project['id']) }}"
         class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
