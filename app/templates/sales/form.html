{% extends "base.html" %}

{% block title %}Record Sale{% endblock %}

{% block content %}
<h1>Record Sale</h1>

<form method="POST" action="{{ url_for('sales.create') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="tap_id" class="form-label">Tap</label>
        <select name="tap_id" id="tap_id" class="form-select" required>
            <option value="">-- Select a tap --</option>
            {% for tap in active_taps %}
                {% if tap.batch_id %}
                <option value="{{ tap.id }}">{{ tap.name }} - {{ tap.batch_name }} ({{ tap.remaining_volume_oz }} oz remaining)</option>
                {% endif %}
            {% endfor %}
        </select>
        <div class="form-text">Only taps with an assigned batch are shown.</div>
    </div>

    <div class="mb-3">
        <label for="sale_type" class="form-label">Sale Type</label>
        <select name="sale_type" id="sale_type" class="form-select" required>
            <option value="">-- Select type --</option>
            <option value="pint">Pint</option>
            <option value="half_pint">Half Pint</option>
            <option value="growler">Growler</option>
            <option value="case">Case</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="quantity_oz" class="form-label">Quantity (oz)</label>
        <input type="number" name="quantity_oz" id="quantity_oz" class="form-control" step="0.1" min="0.1" required>
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">Price ($)</label>
        <input type="number" name="price" id="price" class="form-control" step="0.01" min="0" required>
        <div class="form-text">Enter the price in dollars (e.g., 7.50).</div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Record Sale</button>
        <a href="{{ url_for('sales.list') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
