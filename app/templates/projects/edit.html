{% extends "base.html" %}

{% block title %}Edit {{ project['title'] }}{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Project</h1>

<form method="POST" action="{{ url_for('projects.update', project_id=project['id']) }}"
      class="card bg-dark border-secondary p-4">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="mb-3">
    <label for="title" class="form-label">Title</label>
    <input type="text" class="form-control" id="title" name="title"
           maxlength="200" value="{{ project['title'] }}" required>
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea class="form-control" id="description" name="description" rows="4">{{ project['description'] or '' }}</textarea>
  </div>

  <div class="mb-3">
    <label for="total_budget" class="form-label">Total Budget (USD)</label>
    <input type="number" class="form-control" id="total_budget" name="total_budget"
           min="0" step="0.01"
           value="{{ '%.2f' | format(project['total_budget_cents'] / 100) }}">
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('projects.dashboard', project_id=project['id']) }}" class="btn btn-outline-light">Cancel</a>
  </div>
</form>
{% endblock %}
