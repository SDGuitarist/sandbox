{% extends "base.html" %}

{% block title %}New Project{% endblock %}

{% block content %}
<h1>Create New Project</h1>

<div class="card bg-dark border-secondary mt-3">
    <div class="card-body">
        <form method="POST" action="{{ url_for('projects.create') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="title" class="form-label">Project Title</label>
                <input type="text" class="form-control" id="title" name="title"
                       required maxlength="200" placeholder="e.g. Untitled Feature Film">
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description"
                          rows="3" placeholder="Brief project description (optional)"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Create Project</button>
                <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
