{% extends "base.html" %}

{% block title %}Add Location — {{ project['title'] }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Add Location</h1>
    <a href="{{ url_for('locations.list', project_id=project['id']) }}" class="btn btn-outline-secondary">
        Back to Locations
    </a>
</div>

<div class="card bg-dark border-secondary">
    <div class="card-body">
        <form method="POST" action="{{ url_for('locations.create', project_id=project['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name"
                       maxlength="200" required>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" name="address">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="contact_name" class="form-label">Contact Name</label>
                    <input type="text" class="form-control" id="contact_name" name="contact_name">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="contact_phone" class="form-label">Contact Phone</label>
                    <input type="text" class="form-control" id="contact_phone" name="contact_phone">
                </div>
            </div>

            <div class="mb-3">
                <label for="nearest_hospital" class="form-label">Nearest Hospital</label>
                <input type="text" class="form-control" id="nearest_hospital" name="nearest_hospital">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Location</button>
                <a href="{{ url_for('locations.list', project_id=project['id']) }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
