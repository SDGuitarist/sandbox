{% extends 'base.html' %}

{% block title %}{% if note and note['id'] is defined %}Edit Note{% else %}New Note{% endif %}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="bi bi-sticky"></i>
            {% if note and note['id'] is defined %}Edit Note{% else %}New Note{% endif %}
        </h2>
        <a href="{{ url_for('notes.note_list') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Notes
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST"
                  action="{% if note and note['id'] is defined %}{{ url_for('notes.edit_note', id=note['id']) }}{% else %}{{ url_for('notes.create_note') }}{% endif %}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" name="title"
                           value="{{ note['title'] if note else '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">Content</label>
                    <textarea class="form-control" id="content" name="content"
                              rows="12">{{ note['content'] if note else '' }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="tags" class="form-label">Tags</label>
                    <input type="text" class="form-control" id="tags" name="tags"
                           value="{{ note['tags'] if note else '' }}"
                           placeholder="Comma-separated tags, e.g. ideas, marketing, client-x">
                    <div class="form-text">Separate tags with commas.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        {% if note and note['id'] is defined %}Update Note{% else %}Create Note{% endif %}
                    </button>
                    <a href="{{ url_for('notes.note_list') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
