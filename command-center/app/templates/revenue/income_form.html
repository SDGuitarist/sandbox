{% extends 'base.html' %}

{% block title %}{% if income %}Edit Income{% else %}Add Income{% endif %}{% endblock %}

{% block content %}
<div class="mb-4">
    <h2>
        <i class="bi bi-cash-stack me-2"></i>
        {% if income %}Edit Income{% else %}Add Income{% endif %}
    </h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="amount" class="form-label">Amount ($) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" min="0.01" class="form-control" id="amount" name="amount"
                           value="{{ '%.2f' % (income['amount'] / 100) if income and income['amount'] else '' }}"
                           required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date"
                           value="{{ income['date'] if income else '' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="contact_id" class="form-label">Client</label>
                    <select class="form-select" id="contact_id" name="contact_id">
                        <option value="">-- None --</option>
                        {% for contact in contacts %}
                        <option value="{{ contact['id'] }}"
                                {% if income and income['contact_id'] == contact['id'] %}selected{% endif %}>
                            {{ contact['name'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="project_id" class="form-label">Project</label>
                    <select class="form-select" id="project_id" name="project_id">
                        <option value="">-- None --</option>
                        {% for project in projects %}
                        <option value="{{ project['id'] }}"
                                {% if income and income['project_id'] == project['id'] %}selected{% endif %}>
                            {{ project['name'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category">
                        {% for cat in categories %}
                        <option value="{{ cat['name'] }}"
                                {% if income and income['category'] == cat['name'] %}selected{% endif %}>
                            {{ cat['name'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="payment_method" class="form-label">Payment Method</label>
                    <select class="form-select" id="payment_method" name="payment_method">
                        {% for method in ['bank_transfer', 'credit_card', 'cash', 'check', 'paypal', 'stripe', 'other'] %}
                        <option value="{{ method }}"
                                {% if income and income['payment_method'] == method %}selected{% endif %}>
                            {{ method | replace('_', ' ') | title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3">{{ income['notes'] if income else '' }}</textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>
                    {% if income %}Update{% else %}Add{% endif %} Income
                </button>
                <a href="{{ url_for('revenue.pl') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
