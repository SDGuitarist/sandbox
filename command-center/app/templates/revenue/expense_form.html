{% extends 'base.html' %}

{% block title %}{% if expense %}Edit Expense{% else %}Add Expense{% endif %}{% endblock %}

{% block content %}
<div class="mb-4">
    <h2>
        <i class="bi bi-receipt me-2"></i>
        {% if expense %}Edit Expense{% else %}Add Expense{% endif %}
    </h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="amount" class="form-label">Amount ($) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" min="0.01" class="form-control" id="amount" name="amount"
                           value="{{ '%.2f' % (expense['amount'] / 100) if expense and expense['amount'] else '' }}"
                           required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date"
                           value="{{ expense['date'] if expense else '' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category">
                        {% for cat in categories %}
                        <option value="{{ cat['name'] }}"
                                {% if expense and expense['category'] == cat['name'] %}selected{% endif %}>
                            {{ cat['name'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="vendor" class="form-label">Vendor</label>
                    <input type="text" class="form-control" id="vendor" name="vendor"
                           value="{{ expense['vendor'] if expense else '' }}">
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3">{{ expense['notes'] if expense else '' }}</textarea>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="tax_deductible" name="tax_deductible" value="1"
                       {% if expense and expense['tax_deductible'] %}checked{% endif %}>
                <label class="form-check-label" for="tax_deductible">Tax Deductible</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>
                    {% if expense %}Update{% else %}Add{% endif %} Expense
                </button>
                <a href="{{ url_for('revenue.pl') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
