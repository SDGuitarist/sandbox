<div class="modal fade" id="quickAddTaskModal" tabindex="-1" aria-labelledby="quickAddTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="quickAddTaskForm" method="POST" action="{{ url_for('tasks.quick_add') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="modal-header">
                    <h6 class="modal-title" id="quickAddTaskModalLabel">
                        <i class="bi bi-plus-square me-1"></i> Quick Add Task
                    </h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="task-title" class="form-label form-label-sm">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm" id="task-title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="task-due-date" class="form-label form-label-sm">Due Date</label>
                        <input type="date" class="form-control form-control-sm" id="task-due-date" name="due_date">
                    </div>
                    <div class="mb-3">
                        <label for="task-priority" class="form-label form-label-sm">Priority</label>
                        <select class="form-select form-select-sm" id="task-priority" name="priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="task-project" class="form-label form-label-sm">Project</label>
                        <select class="form-select form-select-sm" id="task-project" name="project_id">
                            <option value="">No Project</option>
                            <!-- Populated dynamically or by server-side rendering -->
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="bi bi-plus-lg me-1"></i> Add Task
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
