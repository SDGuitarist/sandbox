{% extends "layout.html" %}

{% block title %}{% if project %}Edit Project{% else %}New Project{% endif %} - Task Tracker{% endblock %}

{% block content %}
<h1>{% if project %}Edit Project{% else %}New Project{% endif %}</h1>
<form method="post" action="{{ action_url }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ project.name if project else '' }}" required>

    <label for="color">Color</label>
    <input type="color" id="color" name="color" value="{{ project.color if project else '#6366f1' }}">

    <button type="submit">{% if project %}Update{% else %}Create{% endif %}</button>
</form>
<a href="{{ url_for('projects.list_projects') }}">Cancel</a>
{% endblock %}
