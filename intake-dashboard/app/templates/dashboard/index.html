{% extends "base.html" %}

{% block title %}Dashboard - Client Intake Dashboard{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Dashboard</h1>
    <span class="badge bg-secondary fs-6">{{ total }} total submissions</span>
</div>

<div class="row g-4">
    {% for status, count in stats.items() %}
    <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 text-center">
            <div class="card-body d-flex flex-column justify-content-center">
                <h2 class="card-title display-6 mb-3">{{ count }}</h2>
                <p class="card-text mb-3">{{ status|status_badge|safe }}</p>
                <a href="{{ url_for('submissions.list_view', status=status) }}"
                   class="btn btn-sm btn-outline-primary mt-auto">
                    View {{ status }}
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
