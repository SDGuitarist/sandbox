{% extends "base.html" %}

{% block title %}{% if plan %}Edit Plan{% else %}New Plan{% endif %} - CoWorkFlow{% endblock %}

{% block content %}
<h1>{% if plan %}Edit Plan{% else %}New Plan{% endif %}</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" maxlength="100" required
            value="{{ plan.name if plan else '' }}">
    </div>

    <div class="form-group">
        <label for="price">Price ($)</label>
        <input type="number" id="price" name="price" step="0.01" min="0" max="999999.99" required
            value="{{ plan.price_cents|dollars_raw if plan else '' }}">
    </div>

    <div class="form-group">
        <label for="billing_cycle">Billing Cycle</label>
        <select id="billing_cycle" name="billing_cycle" required>
            <option value="">-- Select --</option>
            <option value="monthly" {% if plan and plan.billing_cycle == 'monthly' %}selected{% endif %}>Monthly</option>
            <option value="quarterly" {% if plan and plan.billing_cycle == 'quarterly' %}selected{% endif %}>Quarterly</option>
            <option value="annual" {% if plan and plan.billing_cycle == 'annual' %}selected{% endif %}>Annual</option>
        </select>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3">{{ plan.description if plan and plan.description else '' }}</textarea>
    </div>

    {% if plan %}
    <div class="form-group">
        <label>
            <input type="checkbox" name="is_active" value="1"
                {% if plan.is_active %}checked{% endif %}>
            Active
        </label>
    </div>
    {% endif %}

    <div class="form-actions">
        <button type="submit" class="btn">{% if plan %}Update{% else %}Create{% endif %}</button>
        <a href="{{ url_for('plans.list_plans') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
