<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recipe Organizer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">Recipe Organizer</a>
            <div class="nav-links">
                <a href="{{ url_for('recipes.index') }}">Recipes</a>
                <a href="{{ url_for('ingredients.index') }}">Ingredients</a>
                <a href="{{ url_for('search.search') }}">Search</a>
            </div>
        </div>
    </nav>
    <main class="container">
        {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
