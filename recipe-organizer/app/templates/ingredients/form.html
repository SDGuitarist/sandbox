{% extends "layout.html" %}

{% block title %}{{ "Edit Ingredient" if is_edit else "New Ingredient" }}{% endblock %}

{% block content %}
<h1>{{ "Edit Ingredient" if is_edit else "New Ingredient" }}</h1>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required maxlength="100" value="{{ ingredient.name if is_edit and ingredient else '' }}">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">{{ "Update Ingredient" if is_edit else "Create Ingredient" }}</button>
        <a href="{{ url_for('ingredients.index') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
