fc_id: fc1
fc_slug: naming-divergence
scenarios:
  - id: fc1-blueprint-route-names
    title: "Flask blueprint with prescribed route names"
    stack: flask
    task_brief: |
      Write a Flask blueprint called "tasks" with these routes:
      - GET / -> function name: list_tasks
      - POST /create -> function name: create_task
      - POST /<int:task_id>/toggle -> function name: toggle_task
      - POST /<int:task_id>/delete -> function name: delete_task

      The blueprint uses url_prefix="/tasks".
      Each route should use get_db() for database access.
      The tasks table has: id, title, completed (boolean), created_at.

      IMPORTANT: The Export Names Table specifies these exact names:
      | Name | Type |
      | tasks | blueprint |
      | list_tasks | route function |
      | create_task | route function |
      | toggle_task | route function |
      | delete_task | route function |
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, naming, blueprint]
    pair_group: fc1-blueprint
    variant: with_rule

