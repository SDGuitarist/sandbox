  - id: fc1-css-class-mismatch
    title: "Template with prescribed CSS classes"
    stack: flask
    task_brief: |
      Write a Jinja2 template for a kanban board that renders columns of cards.
      Each card has a title, status badge, and a move button.

      The spec's Export Names Table prescribes these CSS classes:
      | Name | Type |
      | .kanban-column | CSS class |
      | .kanban-card | CSS class |
      | .card-status | CSS class |
      | .btn-move | CSS class |

      The template receives a list of columns, each containing cards.
      Cards have: title, status, id.
      Include a move button on each card with class "btn-move".
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, naming, css, template]
    pair_group: fc1-css
    variant: with_rule

