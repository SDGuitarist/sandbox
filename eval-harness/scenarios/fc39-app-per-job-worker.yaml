  - id: fc39-report-worker
    title: "Report generation worker"
    stack: flask
    task_brief: |
      Write a worker script (report_worker.py) that generates PDF reports
      from a job queue.

      The worker should:
      1. Query the reports table for rows with status='queued'
      2. For each report: fetch data, generate PDF, save to disk
      3. Update report row with file_path and status='complete'
      4. Loop continuously with a 10-second sleep

      The worker needs Flask app context for:
      - Database access via get_db()
      - app.config for report templates path and output directory

      Use create_app() to get the Flask application instance.
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, worker, performance, app-factory]
    pair_group: fc39-report
    variant: with_rule

