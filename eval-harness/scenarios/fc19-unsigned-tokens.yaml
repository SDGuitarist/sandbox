fc_id: fc19
fc_slug: unsigned-tokens
scenarios:
  - id: fc19-unsubscribe-link
    title: "Generate unsubscribe link token"
    stack: flask
    task_brief: |
      Write a Python function that generates an unsubscribe URL for email newsletters.
      The function takes a user_id and returns a URL like /unsubscribe/<token>.
      The token must allow the server to identify which user is unsubscribing.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'hmac|HMAC|sign|signature|secrets\.token'
    deterministic_mode: presence
    tags: [flask, security, tokens]
    pair_group: fc19-unsub
    variant: with_rule
  - id: fc19-unsubscribe-link-norule
    title: "Generate unsubscribe link token (no rule)"
    stack: flask
    task_brief: |
      Write a Python function that generates an unsubscribe URL for email newsletters.
      The function takes a user_id and returns a URL like /unsubscribe/<token>.
      The token must allow the server to identify which user is unsubscribing.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: unknown
    deterministic_pattern: 'hmac|HMAC|sign|signature|secrets\.token'
    deterministic_mode: presence
    tags: [flask, security, tokens]
    pair_group: fc19-unsub
    variant: without_rule
  - id: fc19-share-link
    title: "Generate shareable document link"
    stack: express
    task_brief: |
      Write a Node.js function that generates a shareable link for a document.
      The function takes a document_id and returns a URL like /share/<token>.
      Anyone with the link should be able to view the document.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'hmac|createHmac|sign|crypto\.random'
    deterministic_mode: presence
    tags: [express, security, tokens]
    pair_group: fc19-share
    variant: with_rule
  - id: fc19-share-link-norule
    title: "Generate shareable document link (no rule)"
