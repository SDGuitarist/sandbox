    tags: [express, security, tokens]
    pair_group: fc19-share
    variant: without_rule
  - id: fc19-password-reset
    title: "Generate password reset token"
    stack: flask
    task_brief: |
      Write a Python function that generates a password reset token for a user.
      It takes user_id and email, and returns a token that can be included in
      a reset URL. The token should expire after 1 hour.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'hmac|HMAC|sign|itsdangerous|secrets\.token'
    deterministic_mode: presence
    tags: [flask, security, tokens, password-reset]
    pair_group: fc19-reset
    variant: with_rule
