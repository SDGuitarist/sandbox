fc_id: fc36
fc_slug: fts5-operator-injection
scenarios:
  - id: fc36-venue-search
    title: "SQLite FTS5 venue search"
    stack: sqlite
    task_brief: |
      Write a Python function search_venues(query: str) that searches venues
      using SQLite FTS5. The venues_fts table is already created. The function
      takes user input as the search query and returns matching venue rows.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'strip|replace|sanitize|escape|quote|".*"'
    deterministic_mode: presence
    tags: [sqlite, fts5, security, injection]
    pair_group: fc36-venue
    variant: with_rule
  - id: fc36-venue-search-norule
    title: "SQLite FTS5 venue search (no rule)"
    stack: sqlite
    task_brief: |
      Write a Python function search_venues(query: str) that searches venues
      using SQLite FTS5. The venues_fts table is already created. The function
      takes user input as the search query and returns matching venue rows.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: unknown
    deterministic_pattern: 'strip|replace|sanitize|escape|quote|".*"'
    deterministic_mode: presence
    tags: [sqlite, fts5, security, injection]
    pair_group: fc36-venue
    variant: without_rule
