fc_id: fc41
fc_slug: cost-cap-no-tokens
scenarios:
  - id: fc41-batch-enrichment
    title: "Batch LLM enrichment loop with cost cap"
    stack: flask
    task_brief: |
      Write a Python function enrich_leads(leads: list[dict], max_cost: float = 2.0) -> list[dict]
      that enriches each lead by calling an LLM API.

      For each lead:
      1. Build a prompt from lead['name'] and lead['company']
      2. Call client.messages.create(model="claude-haiku-4-5-20251001", ...)
      3. Parse the response text as JSON and merge into the lead dict
      4. Track cumulative cost and stop if max_cost is exceeded

      The API response has response.usage.input_tokens and response.usage.output_tokens.
      Haiku pricing: $0.80/M input tokens, $4.00/M output tokens.

      Return the list of enriched leads (some may be unenriched if cost cap hit).
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, cost-control, tokens, llm]
    pair_group: fc41-enrich
    variant: with_rule

