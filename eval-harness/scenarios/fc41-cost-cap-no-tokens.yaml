  - id: fc41-content-pipeline
    title: "Content generation pipeline with budget"
    stack: flask
    task_brief: |
      Write a Python function generate_content_batch(
          topics: list[str],
          budget_usd: float = 5.0
      ) -> dict that generates blog posts for each topic using an LLM.

      For each topic:
      1. Call client.messages.create() with a writing prompt
      2. Extract the generated text
      3. Track token usage from response.usage.input_tokens and response.usage.output_tokens
      4. Compute running cost and stop the loop if budget_usd is exceeded

      Pricing: $3.00/M input, $15.00/M output (Sonnet).

      Return {"posts": [...], "total_cost": float, "topics_completed": int}.
      The total_cost field MUST reflect actual accumulated token costs.
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, cost-control, tokens, llm]
    pair_group: fc41-pipeline
    variant: with_rule

