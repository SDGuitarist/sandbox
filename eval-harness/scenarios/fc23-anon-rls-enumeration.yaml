      Only the specific record matching the token should be viewable.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: unknown
    deterministic_pattern: 'SECURITY DEFINER'
    deterministic_mode: presence
    tags: [supabase, rls, security]
    pair_group: fc23-share
    variant: without_rule
  - id: fc23-public-profile
    title: "Public user profile access"
    stack: supabase
    task_brief: |
      Write SQL to allow anonymous users to view public user profiles.
      The profiles table has: id, user_id, display_name, bio, avatar_url, is_public.
      Only profiles where is_public = true should be viewable by anonymous users.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'SECURITY DEFINER|RPC'
    deterministic_mode: presence
    tags: [supabase, rls, security]
    pair_group: fc23-profile
    variant: with_rule
