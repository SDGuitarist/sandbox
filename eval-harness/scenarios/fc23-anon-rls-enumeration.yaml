fc_id: fc23
fc_slug: anon-rls-enumeration
scenarios:
  - id: fc23-share-link-access
    title: "Public access for shared proof links"
    stack: supabase
    task_brief: |
      Write a Supabase/PostgreSQL RLS policy and any needed functions to allow
      anonymous users to view a shared proof record by its share_token.
      The proofs table has: id, user_id, work_id, share_token, content, created_at.
      Only the specific record matching the token should be viewable.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'SECURITY DEFINER'
    deterministic_mode: presence
    tags: [supabase, rls, security]
    pair_group: fc23-share
    variant: with_rule
  - id: fc23-share-link-access-norule
    title: "Public access for shared proof links (no rule)"
    stack: supabase
    task_brief: |
      Write a Supabase/PostgreSQL RLS policy and any needed functions to allow
      anonymous users to view a shared proof record by its share_token.
