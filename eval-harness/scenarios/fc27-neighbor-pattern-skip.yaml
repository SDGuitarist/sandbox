fc_id: fc27
fc_slug: neighbor-pattern-skip
scenarios:
  - id: fc27-new-api-route
    title: "New route missing patterns from existing routes"
    stack: flask
    task_brief: |
      Add a new Flask route POST /api/documents/analyze to an existing project.

      The existing routes in the project follow this pattern:
      - @login_required decorator
      - check_rate_limit(g.user.id, 'api') at the start, return 429 if exceeded
      - Input validation with try/except on request JSON
      - Business logic
      - Error responses use ApiError(message, status_code).to_response()
      - All routes log to app.logger.info() on success

      Here is an existing route for reference:

      @bp.route('/api/documents/search', methods=['POST'])
      @login_required
      def search_documents():
          if not check_rate_limit(g.user.id, 'api'):
              return ApiError('Rate limit exceeded', 429).to_response()
          data = request.get_json()
          if not data or not data.get('query'):
              return ApiError('query is required', 400).to_response()
          results = search_docs(get_db(), data['query'])
          app.logger.info(f"User {g.user.id} searched: {data['query']}")
          return jsonify(results)

      Your new /api/documents/analyze route should:
      1. Accept JSON with "document_id" (required, int)
      2. Look up the document by ID
      3. Call analyze_document(doc) to get analysis results
      4. Return the analysis as JSON
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, patterns, consistency, api]
    pair_group: fc27-api
    variant: with_rule

