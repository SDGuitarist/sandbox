  - id: fc27-new-admin-route
    title: "New admin route missing patterns from siblings"
    stack: flask
    task_brief: |
      Add a new Flask route GET /admin/users/export to an existing admin blueprint.

      Existing admin routes all follow this pattern:
      - @require_role('admin') decorator
      - CSRF protection via validate_csrf(request.form.get('csrf_token')) on POST
      - Audit logging: log_admin_action(g.user.id, action_name, details)
      - All responses set Cache-Control: no-store header

      Your new /admin/users/export route should:
      1. Query all users from the database
      2. Format as CSV (id, name, email, created_at)
      3. Return as a downloadable CSV file with appropriate headers
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, patterns, consistency, admin]
    pair_group: fc27-admin
    variant: with_rule

