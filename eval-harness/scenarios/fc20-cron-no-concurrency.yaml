  - id: fc20-invoice-processor
    title: "Process pending invoices"
    stack: flask
    task_brief: |
      Write a function process_pending_invoices() for a cron job that charges
      customers for pending invoices. Query invoices with status='pending',
      process payment for each, update status. Prevent double-charging if
      two cron invocations overlap.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: "UPDATE.*WHERE.*status.*=.*'pending'|atomic|claim"
    deterministic_mode: presence
    tags: [flask, cron, concurrency, payments]
    pair_group: fc20-invoice
    variant: with_rule
