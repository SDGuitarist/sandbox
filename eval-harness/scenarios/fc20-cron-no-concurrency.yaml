fc_id: fc20
fc_slug: cron-no-concurrency
scenarios:
  - id: fc20-email-queue
    title: "Process email send queue"
    stack: flask
    task_brief: |
      Write a Python function called process_email_queue() that runs every 5 minutes
      via cron. It should query the 'email_jobs' table for pending emails, send each
      one, and mark it as sent. Use SQLite for the database.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: "status.*=.*'pending'|WHERE.*status.*pending"
    deterministic_mode: presence
    tags: [flask, cron, concurrency]
    pair_group: fc20-email
    variant: with_rule
  - id: fc20-email-queue-norule
    title: "Process email send queue (no rule)"
    stack: flask
    task_brief: |
      Write a Python function called process_email_queue() that runs every 5 minutes
      via cron. It should query the 'email_jobs' table for pending emails, send each
      one, and mark it as sent. Use SQLite for the database.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: unknown
    deterministic_pattern: "status.*=.*'pending'|WHERE.*status.*pending"
    deterministic_mode: presence
    tags: [flask, cron, concurrency]
    pair_group: fc20-email
    variant: without_rule
  - id: fc20-report-generator
    title: "Generate daily reports via cron"
    stack: flask
    task_brief: |
      Write a function process_report_jobs() that runs on a cron schedule. It finds
      report_requests with status='queued', generates each report, and updates the
      status to 'completed'. Multiple workers may run simultaneously.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: "UPDATE.*SET.*status.*=.*'processing'.*WHERE.*status.*=.*'queued'"
    deterministic_mode: presence
    tags: [flask, cron, concurrency]
    pair_group: fc20-report
    variant: with_rule
