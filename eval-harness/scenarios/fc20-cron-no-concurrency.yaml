  - id: fc20-webhook-retry
    title: "Retry failed webhook deliveries"
    stack: flask
    task_brief: |
      Write a cron job function retry_failed_webhooks() that finds webhook_events
      with status='failed' and attempt_count < 5, retries delivery, and updates
      the status. Handle concurrent cron executions safely.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: "UPDATE.*WHERE.*status.*=.*'failed'|SET.*status.*=.*'retrying'.*WHERE"
