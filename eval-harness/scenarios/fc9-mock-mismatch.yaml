fc_id: fc9
fc_slug: mock-mismatch
scenarios:
  - id: fc9-mock-llm-response
    title: "Mock function matching real LLM response schema"
    stack: flask
    task_brief: |
      Write a mock function mock_analyze_text(text: str) that returns
      the same shape as the real analyze_text() function.

      The real function calls an LLM and returns a dict matching this schema:
      {
        "summary": str (1-3 sentences),
        "sentiment": "positive" | "negative" | "neutral",
        "confidence": float (0.0-1.0),
        "key_phrases": list[str] (up to 5),
        "language": str (ISO 639-1 code)
      }

      The mock should return realistic but deterministic data.
      All fields are required -- consumers destructure every field.
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, mock, schema]
    pair_group: fc9-llm-mock
    variant: with_rule

