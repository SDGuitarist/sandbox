  - id: fc9-mock-beat-assignment
    title: "Mock with correct step assignments"
    stack: flask
    task_brief: |
      Write a mock function mock_generate_story_beats(outline: str) that
      returns the same structure as the real generate_story_beats().

      The real function returns a list of 4 beat dicts, each with:
      {
        "beat_number": int (1-4),
        "title": str,
        "description": str,
        "character_focus": str,
        "tension_level": "low" | "medium" | "high"
      }

      Beat assignments per the spec:
      - Beat 1: Setup (tension: low)
      - Beat 2: Rising conflict (tension: medium)
      - Beat 3: Climax (tension: high)
      - Beat 4: Resolution (tension: low)

      The mock MUST match these exact beat-to-tension assignments.
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, mock, behavioral-contract]
    pair_group: fc9-beats
    variant: with_rule

