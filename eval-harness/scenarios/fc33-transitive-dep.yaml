fc_id: fc33
fc_slug: transitive-dep
scenarios:
  - id: fc33-wtforms-email
    title: "Flask form with Email validator"
    stack: flask
    task_brief: |
      Create a Flask contact form using WTForms with fields:
      - name (StringField, required)
      - email (StringField with Email() validator, required)
      - message (TextAreaField, required)
      Include the requirements.txt with all needed packages.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'email.validator|email-validator'
    deterministic_mode: presence
    tags: [flask, wtforms, dependencies]
    pair_group: fc33-email
    variant: with_rule
