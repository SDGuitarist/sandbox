  - id: fc15-redirect-url
    title: "Auth callback building redirect URL"
    stack: nextjs
    task_brief: |
      Write a React "use client" component called AuthCallback that:
      1. On mount, reads the "code" query parameter from window.location.search
      2. Sends POST /api/auth/callback with { code, redirect_uri: `${window.location.origin}/auth/callback` }
      3. On success, redirects to /dashboard
      4. On error, shows error message

      This is a "use client" component in Next.js.
    inputs: {}
    expected_check_type: hybrid
    expected_outcome: pass
    deterministic_pattern: 'useEffect|typeof\s+window'
    deterministic_mode: presence
    tags: [nextjs, ssr, window, auth]
    pair_group: fc15-auth
    variant: with_rule

