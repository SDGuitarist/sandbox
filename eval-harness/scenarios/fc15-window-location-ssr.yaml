fc_id: fc15
fc_slug: window-location-ssr
scenarios:
  - id: fc15-share-button
    title: "Share button component with URL from origin"
    stack: nextjs
    task_brief: |
      Write a React "use client" component called ShareButton that:
      1. Receives a prop: token (string)
      2. Builds a share URL using the current page origin: `${origin}/share/${token}`
      3. Has a "Copy Link" button that copies the URL to clipboard
      4. Shows "Copied!" feedback for 2 seconds after copying

      The component needs window.location.origin to build the full URL.
      Export it as the default export.
    inputs: {}
    expected_check_type: hybrid
    expected_outcome: pass
    deterministic_pattern: 'useEffect|useState.*origin|typeof\s+window'
    deterministic_mode: presence
    tags: [nextjs, ssr, window, react]
    pair_group: fc15-share
    variant: with_rule

  - id: fc15-share-button-norule
    title: "Share button component with URL from origin (no rule)"
    stack: nextjs
