      2. POST /items/<id>/edit -- updates an existing item's name and price

      Both should call a shared update_item(conn, item_id, name, price) model function.
      Include proper input validation.
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: unknown
    tags: [flask, validation, parity]
    pair_group: fc4-item-parity
    variant: without_rule
