fc_id: fc17
fc_slug: duplicate-boilerplate
scenarios:
  - id: fc17-three-ai-routes
    title: "Three AI routes with shared boilerplate"
    stack: flask
    task_brief: |
      Write three Flask routes that each call an external LLM API:
      1. POST /api/summarize -- summarizes input text
      2. POST /api/translate -- translates input text to a target language
      3. POST /api/classify -- classifies input text into categories

      Each route needs:
      - Rate limiting check: call check_rate_limit(g.user.id) first, return 429 if exceeded
      - Input validation: request JSON must have "text" field (required, max 5000 chars)
      - Timeout: call the LLM with a 15-second timeout
      - Error handling: catch API errors, return 502 with generic message
      - Fallback: if the LLM returns empty, return 500

      The LLM is called via call_llm(prompt: str, timeout: int) -> str.
      The only difference between routes is the system prompt.
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, boilerplate, factory, dry]
    pair_group: fc17-ai-routes
    variant: with_rule

