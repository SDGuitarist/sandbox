  - id: fc17-crud-with-audit
    title: "CRUD routes with repeated audit logging"
    stack: flask
    task_brief: |
      Write four Flask routes for managing "documents":
      1. POST /documents -- create
      2. GET /documents/<int:id> -- read
      3. POST /documents/<int:id>/edit -- update
      4. POST /documents/<int:id>/delete -- delete

      Each write route (create, update, delete) needs:
      - @login_required decorator
      - Input validation (title required, max 200 chars for create/update)
      - Audit log entry: call log_audit(user_id, action, resource_id)
      - Flash message on success
      - Redirect to /documents

      The only difference is the SQL query and the action string.
    inputs: {}
    expected_check_type: llm_judge
    expected_outcome: pass
    tags: [flask, boilerplate, crud, audit]
    pair_group: fc17-crud
    variant: with_rule

