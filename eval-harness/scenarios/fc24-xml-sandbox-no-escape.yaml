fc_id: fc24
fc_slug: xml-sandbox-no-escape
scenarios:
  - id: fc24-screenplay-prompt
    title: "Wrap screenplay text in XML tags for LLM prompt"
    stack: generic
    task_brief: |
      Write a Python function that builds an LLM prompt for screenplay analysis.
      The function takes raw_text (user-submitted screenplay content) and wraps
      it in XML tags: <screenplay_text>...</screenplay_text>. The prompt should
      tell the LLM to analyze the screenplay for structure and character arcs.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'escape|replace.*<|&lt;|html\.escape|xml\.sax\.saxutils'
    deterministic_mode: presence
    tags: [llm, prompt, xml, security]
    pair_group: fc24-screenplay
    variant: with_rule
