  - id: fc16-seed-data
    title: "Migration with seed data insert"
    stack: supabase
    task_brief: |
      Write a PostgreSQL migration that:
      1. Creates a 'roles' table with: id, name, permissions (JSONB)
      2. Seeds it with three default roles: admin, editor, viewer
      Each role should have appropriate permissions.
    inputs: {}
