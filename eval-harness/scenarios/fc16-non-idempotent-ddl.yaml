fc_id: fc16
fc_slug: non-idempotent-ddl
scenarios:
  - id: fc16-create-table-users
    title: "Create users table migration"
    stack: supabase
    task_brief: |
      Write a PostgreSQL migration that creates a users table with columns:
      - id (UUID, primary key, default gen_random_uuid())
      - email (TEXT, unique, not null)
      - name (TEXT, not null)
      - created_at (TIMESTAMPTZ, default now())
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'CREATE TABLE(?![^;]*IF NOT EXISTS)'
    deterministic_mode: absence
    tags: [postgresql, migration, ddl]
    pair_group: fc16-users
    variant: with_rule

  - id: fc16-create-table-users-norule
    title: "Create users table migration (no rule)"
    stack: supabase
    task_brief: |
      Write a PostgreSQL migration that creates a users table with columns:
