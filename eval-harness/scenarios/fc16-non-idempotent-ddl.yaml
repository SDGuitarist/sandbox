  - id: fc16-create-type-enum
    title: "Create enum type and table"
    stack: supabase
    task_brief: |
      Write a PostgreSQL migration that:
      1. Creates an enum type called 'ticket_status' with values: open, in_progress, resolved, closed
      2. Creates a 'tickets' table using that enum type for the status column
      3. Creates a function called 'get_open_tickets' that returns all open tickets
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'CREATE (TABLE|TYPE|INDEX)(?![^;]*IF NOT EXISTS)|CREATE FUNCTION(?![^;]*OR REPLACE)'
    deterministic_mode: absence
    tags: [postgresql, migration, ddl, enum, function]
    pair_group: fc16-enum
    variant: with_rule

