fc_id: fc7
fc_slug: route-prefix-doubling
scenarios:
  - id: fc7-flask-categories
    title: "Flask blueprint with /categories prefix"
    stack: flask
    task_brief: |
      Create a Flask blueprint named 'categories' for managing product categories.
      The blueprint is registered with url_prefix="/categories".
      Add routes for:
      - Listing all categories (GET /)
      - Viewing a single category (GET /<int:id>)
      - Creating a category (POST /)
    inputs:
      blueprint_prefix: "/categories"
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: '/categories/categories'
    deterministic_mode: absence
    tags: [flask, blueprint, routing]
    pair_group: fc7-flask-categories
    variant: with_rule

  - id: fc7-flask-categories-norule
    title: "Flask blueprint with /categories prefix (no rule)"
    stack: flask
    task_brief: |
      Create a Flask blueprint named 'categories' for managing product categories.
      The blueprint is registered with url_prefix="/categories".
      Add routes for:
      - Listing all categories (GET /)
