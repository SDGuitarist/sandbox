      - Creating a category (POST /)
    inputs:
      blueprint_prefix: "/categories"
    expected_check_type: deterministic
    expected_outcome: unknown
    deterministic_pattern: '/categories/categories'
    deterministic_mode: absence
    tags: [flask, blueprint, routing]
    pair_group: fc7-flask-categories
    variant: without_rule

  - id: fc7-express-users
    title: "Express router mounted at /api/users"
    stack: express
    task_brief: |
      Create an Express router for user management.
      The router is mounted with app.use('/api/users', router).
      Add routes for:
      - GET / (list users)
      - GET /:id (get user)
      - POST / (create user)
      - DELETE /:id (delete user)
    inputs:
      router_mount: "/api/users"
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: '/api/users/api/users'
    deterministic_mode: absence
    tags: [express, router, routing]
    pair_group: fc7-express-users
    variant: with_rule

