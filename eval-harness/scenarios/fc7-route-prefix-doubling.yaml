  - id: fc7-flask-orders-nested
    title: "Flask blueprint with /api/v1/orders prefix"
    stack: flask
    task_brief: |
      Create a Flask blueprint named 'orders' for an e-commerce API.
      The blueprint is registered with url_prefix="/api/v1/orders".
      Add routes for:
      - GET / (list orders)
      - GET /<int:order_id> (get order)
      - POST / (create order)
      - PATCH /<int:order_id>/status (update order status)
    inputs:
      blueprint_prefix: "/api/v1/orders"
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: '/api/v1/orders/api'
    deterministic_mode: absence
    tags: [flask, blueprint, routing, nested]
    pair_group: fc7-flask-orders
    variant: with_rule

