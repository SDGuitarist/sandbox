fc_id: fc46
fc_slug: phantom-fk
scenarios:
  - id: fc46-tasks-project
    title: "Tasks table with project_id column"
    stack: sqlite
    task_brief: |
      Write a SQLite CREATE TABLE statement for a 'tasks' table with columns:
      id (INTEGER PRIMARY KEY), project_id (INTEGER), title (TEXT NOT NULL),
      status (TEXT DEFAULT 'pending'), created_at (TEXT DEFAULT CURRENT_TIMESTAMP).
      The project_id references the projects table.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: 'REFERENCES'
    deterministic_mode: presence
    tags: [sqlite, schema, foreign-key]
    pair_group: fc46-tasks
    variant: with_rule
