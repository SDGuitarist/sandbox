fc_id: fc28
fc_slug: proxy-path-stripping
scenarios:
  - id: fc28-express-flask-proxy
    title: "Express proxy to Flask backend at /api"
    stack: express
    task_brief: |
      Configure an Express app to proxy all /api/* requests to a Flask backend
      running on port 5000. Use http-proxy-middleware. The Flask app expects
      the full path including /api prefix.
    inputs: {}
    expected_check_type: deterministic
    expected_outcome: pass
    deterministic_pattern: "pathFilter|pathRewrite"
    deterministic_mode: presence
    tags: [express, proxy, routing]
    pair_group: fc28-flask
    variant: with_rule
  - id: fc28-express-flask-proxy-norule
    title: "Express proxy to Flask backend at /api (no rule)"
