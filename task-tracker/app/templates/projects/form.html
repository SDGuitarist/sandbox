{% extends "layout.html" %}

{% block title %}{% if project %}Edit Project{% else %}New Project{% endif %} - Task Tracker{% endblock %}

{% block content %}
<h1>{% if project %}Edit Project{% else %}New Project{% endif %}</h1>

<form method="post" action="{{ action_url }}">
  <div>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ project.name if project else '' }}">
  </div>
  <div>
    <label for="description">Description</label>
    <textarea id="description" name="description">{{ project.description if project else '' }}</textarea>
  </div>
  <button type="submit">{% if project %}Update{% else %}Create{% endif %}</button>
</form>

<a href="{{ url_for('projects.list_projects') }}">Back to Projects</a>
{% endblock %}
