<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Tagger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; background: #f5f5f5; }
        h1 { margin-bottom: 1rem; }
        .flash { padding: 0.5rem 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .flash.error { background: #fee; color: #c00; }
        .flash.success { background: #efe; color: #060; }
        .flash.warning { background: #ffe; color: #960; }
        form { margin-bottom: 1rem; }
        input[type="text"], input[type="url"] { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 0.4rem 0.8rem; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #555; }
        .bookmark { background: #fff; padding: 1rem; margin-bottom: 0.5rem; border-radius: 4px; border: 1px solid #ddd; }
        .bookmark-url { color: #666; font-size: 0.85rem; word-break: break-all; }
        .bookmark-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
        .tag { display: inline-block; padding: 0.15rem 0.5rem; margin: 0.1rem; background: #e0e7ff; color: #3730a3; border-radius: 12px; font-size: 0.8rem; text-decoration: none; }
        .tag:hover { background: #c7d2fe; }
        .delete-btn { background: #dc2626; font-size: 0.8rem; padding: 0.2rem 0.5rem; }
        .delete-btn:hover { background: #ef4444; }
        .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .search-bar input { flex: 1; }
        .empty { text-align: center; color: #999; padding: 2rem; }
        .active-filter { margin-bottom: 1rem; color: #666; }
        .active-filter a { color: #333; }
    </style>
</head>
<body>
    <h1><a href="/" style="text-decoration:none;color:inherit;">Bookmark Tagger</a></h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
