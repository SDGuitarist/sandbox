        </button>
        <div class="collapse navbar-collapse" id="portalNav">

                <li class="nav-item">

                </li>

                <li class="nav-item">

                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if active_portal == 'approve' %} active{% endif %}"

                    </a>
