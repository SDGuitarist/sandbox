<!doctype html>
<!-- Amplify AI content-engine card template. Tokens (@@NAME@@) are filled by
     render.py :: render_template(data). Design mirrors template/v1.html (the
     hand-editable browser preview). 4:5 portrait, 1080x1350. -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#242424; --muted:#8A857C; --accent:#E8471C; --hair:rgba(36,36,36,.14);
    --cw:1080px; --ch:1350px;
    --display:"Hanken Grotesk",system-ui,sans-serif; --mono:"Space Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{color:var(--ink);font-family:var(--display)}

  .card{width:var(--cw);height:var(--ch);position:relative;overflow:hidden;
    color:var(--ink);padding:100px 92px 62px;display:flex;flex-direction:column;
    background:
      radial-gradient(860px 520px at 86% 4%, rgba(232,71,28,.08), transparent 60%),
      linear-gradient(180deg,#FAF7F1 0%,#F1ECE2 100%);}
  .card .echo{position:absolute;right:-130px;bottom:-150px;width:560px;height:560px;opacity:.06}
  .card .echo svg{width:100%;height:100%}
  .card .grid-dots{position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(rgba(36,36,36,.05) 1.5px, transparent 1.6px);
    background-size:34px 34px;mask-image:linear-gradient(180deg,transparent,#000 40%,#000 72%,transparent)}

  .head{display:flex;align-items:center;position:relative;z-index:1}
  .head img.logo{height:104px;width:auto;display:block}

  .lede{position:relative;z-index:1;margin-top:96px}
  .lede .eyebrow{font-family:var(--mono);color:var(--accent);font-size:25px;
    letter-spacing:.16em;text-transform:uppercase;margin-bottom:24px}
  .lede h2{font-weight:800;font-size:112px;line-height:1.04;letter-spacing:-.035em;margin:0}
  .lede h2 em{font-style:normal;color:var(--accent);font-weight:800}

  .layers{position:relative;z-index:1;margin-top:80px;display:flex;flex-direction:column;gap:22px}
  .layer{display:flex;align-items:baseline;gap:28px;border-top:1px solid var(--hair);padding-top:18px}
  .layer .no{font-family:var(--mono);color:var(--accent);font-size:26px;min-width:56px;font-weight:700}
  .layer .lab{font-weight:700;font-size:46px;min-width:320px;letter-spacing:-.02em}
  .layer .dsc{font-family:var(--mono);color:var(--muted);font-size:24px}

  .foot{position:relative;z-index:1;margin-top:auto;display:flex;justify-content:flex-start;
    align-items:flex-end;font-family:var(--mono)}
  .foot .site{display:flex;flex-direction:column;align-items:flex-start;line-height:1.3;text-align:left}
  .foot .site b{font-weight:700;font-size:24px;color:var(--accent);letter-spacing:.01em}
  .foot .site span{font-size:19px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="card">
    <div class="grid-dots"></div>
    <div class="echo">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <polygon points="104,39 60,64 60,114 104,89" fill="#242424"/>
        <polygon points="16,39 60,64 60,114 16,89" fill="#242424"/>
        <polygon points="60,14 104,39 60,64 16,39" fill="#E8471C"/>
      </svg>
    </div>

    <div class="head">
      <img class="logo" src="@@LOGO@@" alt="Amplify AI">
    </div>

    <div class="lede">
      <div class="eyebrow">@@EYEBROW@@</div>
      <h2>@@TITLE_HTML@@</h2>
    </div>

    <div class="layers">@@LAYERS@@</div>

    <div class="foot">
      <span class="site"><b>@@SITE@@</b><span>@@TAGLINE@@</span></span>
    </div>
  </div>
</body>
</html>
