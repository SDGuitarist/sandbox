<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Snippets{% endblock %}</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    a { color: #2563eb; }
    .flash { padding: 0.6rem 0.9rem; border-radius: 6px; margin-bottom: 0.6rem; }
    .flash.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .flash.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    input[type="text"], textarea { width: 100%; padding: 0.5rem; margin: 0.3rem 0 0.8rem; box-sizing: border-box; }
    button { padding: 0.45rem 0.9rem; cursor: pointer; }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</body>
</html>
