{% extends "base.html" %}
{% block title %}New Snippet{% endblock %}
{% block content %}
  <h1>New Snippet</h1>
  <form method="post" action="{{ url_for('snippets.new') }}">
    <p>
      <label for="title">Title</label><br>
      <input type="text" id="title" name="title" maxlength="200" value="{{ title }}">
    </p>
    <p>
      <label for="body">Body</label><br>
      <textarea id="body" name="body" rows="10" cols="60" maxlength="10000">{{ body }}</textarea>
    </p>
    <p>
      <button type="submit">Create</button>
      <a href="{{ url_for('snippets.list_') }}">Cancel</a>
    </p>
  </form>
{% endblock %}
