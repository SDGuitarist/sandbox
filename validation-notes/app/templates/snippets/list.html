{% extends "base.html" %}
{% block title %}Snippets{% endblock %}
{% block content %}
  <h1>Snippets</h1>
  <p><a href="{{ url_for('snippets.new') }}">New snippet</a></p>
  {% if snippets %}
    <ul>
      {% for snippet in snippets %}
        <li>
          <strong>{{ snippet['title'] }}</strong>
          <a href="{{ url_for('snippets.edit', snippet_id=snippet['id']) }}">Edit</a>
          <form method="post" action="{{ url_for('snippets.delete', snippet_id=snippet['id']) }}" style="display:inline">
            <button type="submit">Delete</button>
          </form>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No snippets yet.</p>
  {% endif %}
{% endblock %}
