{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Revenue by Client</h1>
  <a href="{{ url_for('reports.export_csv', report_type='revenue_by_client') }}" class="btn btn-outline-secondary">Export CSV</a>
</div>

{% if rows %}
<table class="table table-striped">
  <thead>
    <tr>
      <th>Client</th>
      <th class="text-end">Total Revenue</th>
    </tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      <td>{{ row['client_name'] }}</td>
      <td class="text-end">{{ row['total_cents'] | dollars }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-muted">No payment data found.</p>
{% endif %}

<a href="{{ url_for('reports.index') }}" class="btn btn-link">Back to Reports</a>
{% endblock %}
