{% extends "base.html" %}

{% block title %}Create Prompt - Prompt Dashboard{% endblock %}

{% block content %}
<h1>Create Prompt</h1>

<form method="POST" action="{{ url_for('prompts.create') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="name" name="name" required maxlength="200">
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3" maxlength="1000"></textarea>
    </div>

    <div class="mb-3">
        <label for="system_prompt" class="form-label">System Prompt</label>
        <textarea class="form-control mono" id="system_prompt" name="system_prompt" rows="6"></textarea>
    </div>

    <div class="mb-3">
        <label for="user_prompt" class="form-label">User Prompt</label>
        <textarea class="form-control mono" id="user_prompt" name="user_prompt" rows="6"></textarea>
    </div>

    <div class="mb-3">
        <label for="tags" class="form-label">Tags</label>
        <input type="text" class="form-control" id="tags" name="tags"
               placeholder="Comma-separated, e.g. coding, creative, writing">
        {% if tags %}
        <div class="form-text">Existing tags: {{ tags | map(attribute='name') | join(', ') }}</div>
        {% endif %}
    </div>

    <button type="submit" class="btn btn-primary">Create Prompt</button>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
