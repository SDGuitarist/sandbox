{% extends "base.html" %}

{% block title %}Export Data - Admin{% endblock %}

{% block content %}
<h1>Export Data</h1>
<p class="text-muted">Export all prompts from all users. Choose a format below.</p>

<form method="POST" action="{{ url_for('admin.export_data') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label class="form-label">Export Format</label>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="format" id="format_json"
                   value="json" checked>
            <label class="form-check-label" for="format_json">JSON</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="format" id="format_csv"
                   value="csv">
            <label class="form-check-label" for="format_csv">CSV</label>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Download Export</button>
</form>
{% endblock %}
